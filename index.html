<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StreamTV — Live Streaming Player</title>
  <style>
    /* ============================================
       STREAMTV — Live Streaming Player
       Dark theme + neon green accent
       ============================================ */
    
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: #0a0a0a;
      color: #e0e0e0;
      min-height: 100vh;
      overflow-x: hidden;
    }
    
    /* Header */
    .header {
      background: #111;
      border-bottom: 1px solid #1a1a1a;
      padding: 12px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    
    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    
    .logo-icon {
      width: 36px;
      height: 36px;
      background: #00e676;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }
    
    .logo-text h1 {
      font-size: 16px;
      color: #fff;
      font-weight: 700;
    }
    
    .logo-text span {
      font-size: 10px;
      color: #666;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    
    .header-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    
    .status-badge {
      display: flex;
      align-items: center;
      gap: 6px;
      background: #1a1a1a;
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 12px;
    }
    
    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #00e676;
      animation: pulse 2s infinite;
    }
    
    .status-dot.red { background: #ff5252; }
    
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    
    /* Category Bar */
    .category-bar {
      background: #111;
      padding: 10px 20px;
      display: flex;
      align-items: center;
      gap: 8px;
      overflow-x: auto;
      scrollbar-width: none;
      border-bottom: 1px solid #1a1a1a;
    }
    
    .category-bar::-webkit-scrollbar { display: none; }
    
    .category-label {
      font-size: 11px;
      color: #666;
      text-transform: uppercase;
      letter-spacing: 1px;
      white-space: nowrap;
      margin-right: 8px;
    }
    
    .category-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      color: #aaa;
      padding: 8px 14px;
      border-radius: 20px;
      cursor: pointer;
      font-size: 13px;
      white-space: nowrap;
      transition: all 0.2s;
    }
    
    .category-btn:hover {
      background: #222;
      border-color: #00e676;
      color: #fff;
    }
    
    .category-btn.active {
      background: #00e676;
      color: #000;
      border-color: #00e676;
      font-weight: 600;
    }
    
    .category-count {
      background: rgba(255,255,255,0.1);
      padding: 2px 6px;
      border-radius: 10px;
      font-size: 11px;
    }
    
    .category-btn.active .category-count {
      background: rgba(0,0,0,0.2);
    }
    
    /* Main Layout */
    .main {
      display: flex;
      height: calc(100vh - 110px);
    }
    
    /* Player Area */
    .player-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: #0d0d0d;
    }
    
    .player-container {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #000;
      position: relative;
    }
    
    .player-placeholder {
      text-align: center;
      color: #333;
    }
    
    .player-placeholder .icon {
      font-size: 64px;
      margin-bottom: 16px;
    }
    
    .player-placeholder h2 {
      font-size: 18px;
      color: #555;
      margin-bottom: 8px;
    }
    
    .player-placeholder p {
      font-size: 13px;
      color: #333;
    }
    
    /* Video Player */
    #videoPlayer {
      width: 100%;
      height: 100%;
      background: #000;
    }
    
    /* Player Info Bar */
    .player-info {
      background: #111;
      padding: 10px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-top: 1px solid #1a1a1a;
    }
    
    .now-playing {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
    }
    
    .now-playing .live-badge {
      background: #ff5252;
      color: #fff;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
    }
    
    .player-controls {
      display: flex;
      gap: 8px;
    }
    
    .control-btn {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      color: #aaa;
      padding: 6px 12px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
      transition: all 0.2s;
    }
    
    .control-btn:hover {
      background: #222;
      color: #fff;
    }
    
    /* Sidebar */
    .sidebar {
      width: 320px;
      background: #111;
      border-left: 1px solid #1a1a1a;
      display: flex;
      flex-direction: column;
    }
    
    .sidebar-header {
      padding: 12px;
      border-bottom: 1px solid #1a1a1a;
    }
    
    .search-box {
      display: flex;
      align-items: center;
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 8px;
      padding: 8px 12px;
      gap: 8px;
    }
    
    .search-box input {
      flex: 1;
      background: none;
      border: none;
      color: #fff;
      font-size: 13px;
      outline: none;
    }
    
    .search-box input::placeholder { color: #555; }
    
    .search-icon { color: #555; font-size: 14px; }
    
    /* Filter Tabs */
    .filter-tabs {
      display: flex;
      gap: 4px;
      padding: 8px 12px;
      border-bottom: 1px solid #1a1a1a;
    }
    
    .filter-tab {
      display: flex;
      align-items: center;
      gap: 4px;
      background: none;
      border: none;
      color: #666;
      padding: 6px 10px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
      transition: all 0.2s;
    }
    
    .filter-tab:hover { background: #1a1a1a; color: #aaa; }
    
    .filter-tab.active {
      background: #00e676;
      color: #000;
      font-weight: 600;
    }
    
    /* Channel List */
    .channel-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
    }
    
    .channel-list::-webkit-scrollbar { width: 4px; }
    .channel-list::-webkit-scrollbar-track { background: transparent; }
    .channel-list::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }
    
    .channel-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s;
      margin-bottom: 4px;
    }
    
    .channel-item:hover { background: #1a1a1a; }
    
    .channel-item.active {
      background: rgba(0, 230, 118, 0.1);
      border: 1px solid rgba(0, 230, 118, 0.3);
    }
    
    .channel-thumb {
      width: 48px;
      height: 32px;
      background: #222;
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
    }
    
    .channel-info {
      flex: 1;
      min-width: 0;
    }
    
    .channel-name {
      font-size: 13px;
      color: #ddd;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    
    .channel-meta {
      font-size: 11px;
      color: #555;
      margin-top: 2px;
    }
    
    .channel-live {
      font-size: 10px;
      color: #ff5252;
      font-weight: 600;
    }
    
    /* Comments Section */
    .comments-section {
      background: #111;
      border-top: 1px solid #1a1a1a;
      padding: 12px;
      max-height: 200px;
      overflow-y: auto;
    }
    
    .comments-title {
      font-size: 13px;
      color: #666;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    
    .comment {
      display: flex;
      gap: 8px;
      margin-bottom: 8px;
    }
    
    .comment-avatar {
      width: 24px;
      height: 24px;
      background: #2a2a2a;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      flex-shrink: 0;
    }
    
    .comment-body {
      flex: 1;
    }
    
    .comment-user {
      font-size: 12px;
      color: #00e676;
      font-weight: 600;
    }
    
    .comment-text {
      font-size: 12px;
      color: #aaa;
      margin-top: 2px;
    }
    
    .comment-time {
      font-size: 10px;
      color: #444;
      margin-top: 2px;
    }
    
    /* Responsive */
    @media (max-width: 768px) {
      .main { flex-direction: column; height: auto; }
      .sidebar { width: 100%; height: 50vh; }
      .player-container { min-height: 50vh; }
      .category-bar { padding: 8px 12px; }
    }
  </style>
</head>
<body>
  <!-- Header -->
  <div class="header">
    <div class="logo">
      <div class="logo-icon">▶</div>
      <div class="logo-text">
        <h1>StreamTV</h1>
        <span>Live Streaming Player</span>
      </div>
    </div>
    <div class="header-right">
      <div class="status-badge">
        <div class="status-dot"></div>
        <span id="onlineCount">3 online</span>
      </div>
    </div>
  </div>

  <!-- Category Bar -->
  <div class="category-bar">
    <span class="category-label">Category</span>
    <button class="category-btn active" onclick="selectCategory('all', this)">
      ⭐ All Channels <span class="category-count">402</span>
    </button>
    <button class="category-btn" onclick="selectCategory('worldcup', this)">
      🏆 World Cup 2026 <span class="category-count">42</span>
    </button>
    <button class="category-btn" onclick="selectCategory('sports', this)">
      ⚽ Sports <span class="category-count">277</span>
    </button>
    <button class="category-btn" onclick="selectCategory('sporttv', this)">
      🌐 Sport TV <span class="category-count">106</span>
    </button>
    <button class="category-btn" onclick="selectCategory('live', this)">
      📅 Live Events <span class="category-count">22</span>
    </button>
    <button class="category-btn" onclick="selectCategory('kids', this)">
      😊 Kids <span class="category-count">90</span>
    </button>
  </div>

  <!-- Main Content -->
  <div class="main">
    <!-- Player Area -->
    <div class="player-area">
      <div class="player-container" id="playerContainer">
        <div class="player-placeholder" id="placeholder">
          <div class="icon">📺</div>
          <h2>Select a channel to start watching</h2>
          <p>Choose a category and pick a channel from the list</p>
        </div>
        <video id="videoPlayer" style="display:none" controls autoplay></video>
      </div>
      <div class="player-info">
        <div class="now-playing" id="nowPlaying">
          <span>No channel selected</span>
        </div>
        <div class="player-controls">
          <button class="control-btn" onclick="toggleFullscreen()">⛶ Fullscreen</button>
          <button class="control-btn" onclick="toggleFavorite()">⭐ Favorite</button>
        </div>
      </div>
      <!-- Comments -->
      <div class="comments-section" id="commentsSection">
        <div class="comments-title">💬 Live Chat</div>
        <div id="commentsList"></div>
      </div>
    </div>

    <!-- Sidebar -->
    <div class="sidebar">
      <div class="sidebar-header">
        <div class="search-box">
          <span class="search-icon">🔍</span>
          <input type="text" id="searchInput" placeholder="Search channels... (press / to focus)" oninput="filterChannels()">
        </div>
      </div>
      <div class="filter-tabs">
        <button class="filter-tab active" onclick="setFilter('all', this)">All</button>
        <button class="filter-tab" onclick="setFilter('popular', this)">🔥 Popular</button>
        <button class="filter-tab" onclick="setFilter('favorites', this)">⭐ Favorites</button>
        <button class="filter-tab" onclick="setFilter('new', this)">🕐 New</button>
      </div>
      <div class="channel-list" id="channelList">
        <div style="text-align:center; color:#444; padding:40px 20px;">
          Select a category to see channels
        </div>
      </div>
    </div>
  </div>

  <script>
    // ============================================
    // StreamTV — Channel Data & Logic
    // ============================================

    // Sample channel data
    const channels = {
      worldcup: [
        { id: 1, name: "[FIFA World Cup] Portugal vs Germany", category: "worldcup", popular: true, new: false, live: true, icon: "🏆" },
        { id: 2, name: "[FIFA World Cup] Brazil vs France", category: "worldcup", popular: true, new: false, live: true, icon: "🏆" },
        { id: 3, name: "[FIFA World Cup] Argentina vs Spain", category: "worldcup", popular: true, new: true, live: true, icon: "🏆" },
        { id: 4, name: "[FIFA World Cup] England vs Netherlands", category: "worldcup", popular: true, new: false, live: true, icon: "🏆" },
        { id: 5, name: "[FIFA World Cup] Japan vs Belgium", category: "worldcup", popular: false, new: true, live: false, icon: "🏆" },
        { id: 6, name: "[FIFA World Cup] Mexico vs USA", category: "worldcup", popular: true, new: false, live: true, icon: "🏆" },
        { id: 7, name: "[FIFA World Cup] Morocco vs Croatia", category: "worldcup", popular: false, new: true, live: false, icon: "🏆" },
        { id: 8, name: "[FIFA World Cup] Uruguay vs Colombia", category: "worldcup", popular: false, new: false, live: true, icon: "🏆" },
      ],
      sports: [
        { id: 10, name: "beIN Sports 1", category: "sports", popular: true, new: false, live: true, icon: "⚽" },
        { id: 11, name: "beIN Sports 2", category: "sports", popular: true, new: false, live: true, icon: "⚽" },
        { id: 12, name: "Sky Sports Football", category: "sports", popular: true, new: false, live: true, icon: "⚽" },
        { id: 13, name: "ESPN", category: "sports", popular: true, new: false, live: true, icon: "🏀" },
        { id: 14, name: "ESPN 2", category: "sports", popular: false, new: false, live: true, icon: "🏀" },
        { id: 15, name: "Fox Sports 1", category: "sports", popular: true, new: false, live: true, icon: "🏈" },
        { id: 16, name: "Fox Sports 2", category: "sports", popular: false, new: false, live: false, icon: "🏈" },
        { id: 17, name: "NBC Sports", category: "sports", popular: false, new: true, live: true, icon: "⚾" },
        { id: 18, name: "DAZN", category: "sports", popular: true, new: false, live: true, icon: "🥊" },
        { id: 19, name: "SuperSport Football", category: "sports", popular: false, new: false, live: true, icon: "⚽" },
        { id: 20, name: "Star Sports 1", category: "sports", popular: false, new: false, live: true, icon: "🏏" },
        { id: 21, name: "Ten Sports", category: "sports", popular: false, new: true, live: false, icon: "⚽" },
      ],
      sporttv: [
        { id: 30, name: "Sport TV 1 HD", category: "sporttv", popular: true, new: false, live: true, icon: "📺" },
        { id: 31, name: "Sport TV 2 HD", category: "sporttv", popular: true, new: false, live: true, icon: "📺" },
        { id: 32, name: "Sport TV 3 HD", category: "sporttv", popular: false, new: false, live: true, icon: "📺" },
        { id: 33, name: "Eurosport 1", category: "sporttv", popular: true, new: false, live: true, icon: "🎾" },
        { id: 34, name: "Eurosport 2", category: "sporttv", popular: false, new: false, live: false, icon: "🎾" },
        { id: 35, name: "BT Sport 1", category: "sporttv", popular: true, new: true, live: true, icon: "⚽" },
        { id: 36, name: "BT Sport 2", category: "sporttv", popular: false, new: false, live: true, icon: "⚽" },
      ],
      live: [
        { id: 40, name: "Live: UFC 320", category: "live", popular: true, new: true, live: true, icon: "🥊" },
        { id: 41, name: "Live: NBA Finals", category: "live", popular: true, new: true, live: true, icon: "🏀" },
        { id: 42, name: "Live: Champions League", category: "live", popular: true, new: false, live: true, icon: "⚽" },
        { id: 43, name: "Live: MotoGP", category: "live", popular: false, new: true, live: true, icon: "🏍️" },
        { id: 44, name: "Live: F1 Race", category: "live", popular: true, new: false, live: false, icon: "🏎️" },
      ],
      kids: [
        { id: 50, name: "Cartoon Network", category: "kids", popular: true, new: false, live: true, icon: "🎬" },
        { id: 51, name: "Nickelodeon", category: "kids", popular: true, new: false, live: true, icon: "🎬" },
        { id: 52, name: "Disney Channel", category: "kids", popular: true, new: false, live: true, icon: "✨" },
        { id: 53, name: "Disney Junior", category: "kids", popular: false, new: false, live: true, icon: "✨" },
        { id: 54, name: "Baby TV", category: "kids", popular: false, new: false, live: true, icon: "👶" },
        { id: 55, name: "Boomerang", category: "kids", popular: false, new: true, live: false, icon: "🐰" },
      ],
    };

    // English comments
    const sampleComments = [
      { user: "StreamFan99", text: "Great quality stream! 🔥", time: "2 min ago" },
      { user: "SportsLover", text: "Anyone else watching from Europe?", time: "5 min ago" },
      { user: "FootballKing", text: "This channel is always reliable", time: "8 min ago" },
      { user: "NightOwl", text: "Love the HD quality here", time: "12 min ago" },
      { user: "ChillVibes", text: "Best streaming site I've found", time: "15 min ago" },
      { user: "GameDay", text: "Let's go! Ready for the match ⚽", time: "18 min ago" },
      { user: "TechWizard", text: "Works perfectly on mobile too", time: "22 min ago" },
      { user: "MovieBuff", text: "Thanks for the stream!", time: "25 min ago" },
    ];

    // State
    let currentCategory = 'all';
    let currentFilter = 'all';
    let currentChannel = null;
    let favorites = JSON.parse(localStorage.getItem('favorites') || '[]');

    // Initialize
    document.addEventListener('DOMContentLoaded', () => {
      loadComments();
      document.addEventListener('keydown', (e) => {
        if (e.key === '/' && document.activeElement.tagName !== 'INPUT') {
          e.preventDefault();
          document.getElementById('searchInput').focus();
        }
      });
    });

    // Select category
    function selectCategory(category, btn) {
      currentCategory = category;
      document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderChannels();
    }

    // Set filter
    function setFilter(filter, btn) {
      currentFilter = filter;
      document.querySelectorAll('.filter-tab').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderChannels();
    }

    // Get channels for current category
    function getChannels() {
      if (currentCategory === 'all') {
        return Object.values(channels).flat();
      }
      return channels[currentCategory] || [];
    }

    // Filter channels
    function filterChannels() {
      renderChannels();
    }

    // Render channel list
    function renderChannels() {
      const list = document.getElementById('channelList');
      const search = document.getElementById('searchInput').value.toLowerCase();
      let chs = getChannels();

      if (search) {
        chs = chs.filter(c => c.name.toLowerCase().includes(search));
      }

      if (currentFilter === 'popular') {
        chs = chs.filter(c => c.popular);
      } else if (currentFilter === 'favorites') {
        chs = chs.filter(c => favorites.includes(c.id));
      } else if (currentFilter === 'new') {
        chs = chs.filter(c => c.new);
      }

      if (chs.length === 0) {
        list.innerHTML = '<div style="text-align:center; color:#444; padding:40px 20px;">No channels found</div>';
        return;
      }

      list.innerHTML = chs.map(ch => `
        <div class="channel-item ${currentChannel?.id === ch.id ? 'active' : ''}" onclick="playChannel(${ch.id})">
          <div class="channel-thumb">${ch.icon}</div>
          <div class="channel-info">
            <div class="channel-name">${ch.name}</div>
            <div class="channel-meta">${ch.category.toUpperCase()} ${ch.live ? '<span class="channel-live">● LIVE</span>' : ''}</div>
          </div>
        </div>
      `).join('');
    }

    // Play channel
    function playChannel(id) {
      const allChs = Object.values(channels).flat();
      const ch = allChs.find(c => c.id === id);
      if (!ch) return;

      currentChannel = ch;
      
      document.getElementById('placeholder').style.display = 'none';
      const video = document.getElementById('videoPlayer');
      video.style.display = 'block';
      
      // Demo stream (Big Buck Bunny)
      video.src = 'https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8';
      video.play().catch(() => {});

      document.getElementById('nowPlaying').innerHTML = `
        ${ch.live ? '<span class="live-badge">LIVE</span>' : ''}
        <span>${ch.name}</span>
      `;

      renderChannels();
    }

    // Toggle fullscreen
    function toggleFullscreen() {
      const container = document.getElementById('playerContainer');
      if (document.fullscreenElement) {
        document.exitFullscreen();
      } else {
        container.requestFullscreen();
      }
    }

    // Toggle favorite
    function toggleFavorite() {
      if (!currentChannel) return;
      const idx = favorites.indexOf(currentChannel.id);
      if (idx > -1) {
        favorites.splice(idx, 1);
      } else {
        favorites.push(currentChannel.id);
      }
      localStorage.setItem('favorites', JSON.stringify(favorites));
      renderChannels();
    }

    // Load comments
    function loadComments() {
      const list = document.getElementById('commentsList');
      list.innerHTML = sampleComments.map(c => `
        <div class="comment">
          <div class="comment-avatar">${c.user[0]}</div>
          <div class="comment-body">
            <div class="comment-user">${c.user}</div>
            <div class="comment-text">${c.text}</div>
            <div class="comment-time">${c.time}</div>
          </div>
        </div>
      `).join('');
    }

    // Simulate online count
    setInterval(() => {
      const count = Math.floor(Math.random() * 8) + 1;
