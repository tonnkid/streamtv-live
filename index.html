<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#000000">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="description" content="GesBoharTV — streaming player profesional untuk channel dari berbagai negara.">
<link rel="manifest" href="/manifest.json">
<link rel="icon" type="image/svg+xml" href="/icon.svg">
<link rel="apple-touch-icon" href="/icon.svg">
<title>GesBoharTV — Streaming Player</title>
<!-- Player libraries are lazy-loaded on demand by loadPlayerLib() in script below.
     This shaves ~500KB from first paint. -->
<style>
:root{
  --bg:#000000;
  --glass:rgba(28,28,30,.62);
  --glass-2:rgba(44,44,46,.55);
  --glass-3:rgba(58,58,60,.6);
  --glass-border:rgba(255,255,255,.10);
  --glass-border-strong:rgba(255,255,255,.16);
  --text:#f5f5f7; --muted:rgba(235,235,245,.72); --muted-2:rgba(235,235,245,.5);
  --accent:#30d158; --accent-2:#5fe57f; --accent-soft:rgba(48,209,88,.16);
  --danger:#ff453a; --warn:#ffd60a; --info:#0a84ff; --purple:#bf5af3;
  --radius:22px; --radius-md:16px; --radius-sm:12px; --radius-pill:999px;
  --blur:saturate(180%) blur(22px);
  --shadow:0 2px 6px rgba(0,0,0,.28);
  --safe-t:env(safe-area-inset-top,0px);
  --safe-b:env(safe-area-inset-bottom,0px);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:#000}
::-webkit-scrollbar{width:10px;height:10px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(235,235,245,.18);border-radius:var(--radius-pill);border:2px solid transparent;background-clip:content-box}
::-webkit-scrollbar-thumb:hover{background:rgba(235,235,245,.3);background-clip:content-box}
body{
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","SF Pro Text","Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  color:var(--text); height:100dvh; letter-spacing:-.01em;
  background: #000;
  display:grid; grid-template-columns:minmax(0,1fr) minmax(340px,460px); grid-template-rows:auto auto minmax(0,1fr);
  grid-template-areas:"header header" "sidebar sidebar" "main channels";
  overflow:hidden; -webkit-font-smoothing:antialiased; -moz-osx-font-smoothing:grayscale;
  padding:10px; gap:10px; width:100%; max-width:1360px; margin-inline:auto;
}

/* ===== Header ===== */
header{
  grid-area:header; background: rgba(0,0,0,.78); -webkit-backdrop-filter: blur(12px); backdrop-filter: blur(12px);
  border:1px solid var(--glass-border); border-radius:var(--radius);
  display:flex; align-items:center; padding:12px 20px; gap:16px;
  box-shadow:var(--shadow); padding-top:max(12px,var(--safe-t));
}
.brand{display:flex; align-items:center; gap:13px; text-decoration:none}
.brand-mark{
  width:42px; height:42px; border-radius:13px; flex-shrink:0;
  background:linear-gradient(135deg,var(--accent),var(--accent-2));
  display:flex; align-items:center; justify-content:center;
  box-shadow:0 8px 22px rgba(48,209,88,.45), inset 0 1px 0 rgba(255,255,255,.4);
}
.brand-mark svg{width:22px; height:22px; display:block}
.brand-text{font-size:21px; font-weight:700; letter-spacing:-.03em; color:var(--text); line-height:1}
.brand-text span{color:var(--accent)}
.brand-tag{
  font-size:10px; font-weight:600; letter-spacing:.14em; text-transform:uppercase;
  color:var(--muted-2); margin-top:4px;
}
header .info{
  color:var(--muted); font-size:13px; margin-left:auto; font-weight:500;
  display:flex; align-items:center; gap:8px; background:var(--glass-2);
  padding:7px 14px; border-radius:var(--radius-pill); border:1px solid var(--glass-border);
  -webkit-backdrop-filter:blur(10px); backdrop-filter:blur(10px); white-space:nowrap;
}
header .info .dot{width:8px; height:8px; border-radius:50%; background:var(--accent); box-shadow:0 0 10px var(--accent)}

/* online viewer counter in header */
.online-badge{
  display:flex; align-items:center; gap:7px; margin-left:10px;
  background:var(--glass-2); padding:7px 14px; border-radius:var(--radius-pill);
  border:1px solid var(--glass-border); -webkit-backdrop-filter:blur(10px); backdrop-filter:blur(10px);
  font-size:13px; color:var(--muted); font-weight:500; white-space:nowrap; cursor:default;
}
.online-badge .live-dot{
  width:8px; height:8px; border-radius:50%; background:var(--danger);
  box-shadow:0 0 10px var(--danger); animation:livePulse 2s infinite;
}
@keyframes livePulse{
  0%,100%{opacity:1} 50%{opacity:.35}
}
.online-badge .count-num{color:var(--text); font-weight:700}
.online-badge .count-label{color:var(--muted-2); font-size:11px; letter-spacing:.03em}

@media (max-width:900px){
  .online-badge{padding:6px 10px; gap:5px; font-size:12px; margin-left:6px}
  .online-badge .count-label{display:none}
}

/* ===== Category bar (horizontal pills, Zentara-style) ===== */
aside{
  grid-area:sidebar; background: rgba(18,18,20,.92); -webkit-backdrop-filter: none; backdrop-filter: none;
  border:1px solid var(--glass-border); border-radius:var(--radius); box-shadow:var(--shadow);
  display:flex; align-items:center; gap:6px; overflow:hidden; padding:10px 8px;
}
.side-label{ display:none; }
.sheet-handle{ display:none; }
/* left/right scroll arrows */
.catnav{
  flex-shrink:0; width:34px; height:34px; border-radius:50%;
  display:flex; align-items:center; justify-content:center;
  background:var(--glass-2); border:1px solid var(--glass-border); color:var(--text);
  cursor:pointer; font-size:20px; line-height:1; padding:0;
  transition:background .15s, opacity .15s;
}
.catnav:hover{background:var(--glass-3)}
.catnav:disabled{opacity:.25; cursor:default; pointer-events:none}
#countries{
  flex:1 1 auto; min-width:0;
  display:flex; flex-direction:row; flex-wrap:nowrap; align-items:center; gap:8px;
  overflow-x:auto; overflow-y:hidden; white-space:nowrap; scroll-behavior:smooth;
  scrollbar-width:none;
}
#countries::-webkit-scrollbar{display:none}
.country-item{
  padding:8px 14px; cursor:pointer; font-size:14px; font-weight:500;
  display:inline-flex; align-items:center; gap:8px; border-radius:var(--radius-pill);
  color:var(--text); flex-shrink:0; white-space:nowrap;
  background:var(--glass-2); border:1px solid var(--glass-border);
  transition:background .18s, transform .12s, border-color .18s;
}
.country-item:hover{background:var(--glass-3); border-color:rgba(255,255,255,.16)}
.country-item:active{transform:scale(.97)}
.country-item.active{background:var(--accent-soft); color:var(--accent-2); font-weight:600; border-color:var(--accent)}
.country-item .cname{min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap}
/* channel-count badge inside pill */
.country-item .count{
  display:none; min-width:20px; padding:1px 7px; border-radius:var(--radius-pill);
  background:var(--glass-3); color:var(--muted); font-size:11px; font-weight:700;
  font-variant-numeric:tabular-nums; text-align:center; line-height:1.6;
}
.country-item .count.show{display:inline-block}
.country-item.active .count{background:rgba(48,209,88,.22); color:var(--accent-2)}
.country-item .count{color:var(--muted-2); font-size:12px; font-weight:500; font-variant-numeric:tabular-nums}
.country-item.active .count{color:var(--accent)}

/* flags & category badges */
.flag{
  width:26px; height:19px; border-radius:5px; object-fit:cover; flex-shrink:0;
  box-shadow:0 0 0 1px rgba(255,255,255,.12), 0 2px 5px rgba(0,0,0,.3);
}
.flag-sm{width:22px; height:16px; border-radius:4px}
.cat-badge{
  width:26px; height:19px; flex-shrink:0; border-radius:6px;
  background:var(--glass-3); color:var(--muted); border:1px solid var(--glass-border);
  font-size:9px; font-weight:700; letter-spacing:.02em;
  display:flex; align-items:center; justify-content:center;
}
.cat-badge.sm{width:22px; height:16px; font-size:8px; border-radius:5px}

/* section label inside the horizontal bar */
.nav-section{
  font-size:10px; text-transform:uppercase; color:var(--muted-2); font-weight:700;
  padding:0 4px 0 10px; letter-spacing:.1em; flex-shrink:0; align-self:center;
}
.nav-section:first-child{padding-left:2px}

/* category icon (flat, emoji-like) */
.cat-icon{
  width:22px; height:22px; flex-shrink:0; border-radius:7px;
  display:flex; align-items:center; justify-content:center;
  background:transparent; border:none; color:var(--accent-2);
}
.cat-icon svg{width:18px; height:18px; display:block}
.country-item.active .cat-icon{background:transparent; border-color:transparent}

/* channel logo */
.ch-logo{
  width:48px; height:48px; border-radius:12px; flex-shrink:0; object-fit:contain;
  background:var(--glass-3); box-shadow:inset 0 0 0 1px var(--glass-border);
}
.ch-logo-fallback{
  display:flex; align-items:center; justify-content:center;
  font-size:15px; font-weight:700; color:var(--muted); letter-spacing:.02em;
}

/* ===== Main / Player ===== */
main{
  grid-area:main; display:flex; flex-direction:column; align-items:center; justify-content:center;
  position:relative; gap:8px; background:transparent; border:none; box-shadow:none; overflow:hidden;
}
.player-wrap{
  flex:0 1 auto; width:100%; height:auto; aspect-ratio:16/9; max-height:calc(100% - 56px); max-width:100%;
  display:flex; align-items:center; justify-content:center; min-height:0;
  background:#000; border-radius:var(--radius); overflow:hidden;
  border:1px solid var(--glass-border); box-shadow:var(--shadow);
}
video{width:100%; height:100%; max-height:100%; background:#000; object-fit:contain}
.player-empty{color:var(--muted); text-align:center; padding:40px; max-width:440px}
.player-empty svg{
  width:84px; height:84px; margin-bottom:22px; color:var(--accent);
  filter:drop-shadow(0 8px 24px rgba(48,209,88,.45));
}
.player-empty h3{font-size:21px; font-weight:700; letter-spacing:-.02em; color:var(--text); margin-bottom:8px}
.player-empty p{font-size:14px; line-height:1.6; color:var(--muted)}
.player-info{
  width:100%; max-width:100%; align-self:center;
  background: rgba(0,0,0,.55); -webkit-backdrop-filter: blur(8px); backdrop-filter: blur(8px);
  padding:12px 18px; border:1px solid var(--glass-border); border-radius:var(--radius-md);
  display:flex; justify-content:space-between; align-items:center; gap:16px;
}
.player-info .title{font-size:17px; font-weight:700; letter-spacing:-.02em; display:flex; align-items:center; gap:10px}

/* ===== Channels panel ===== */
section.channels{
  grid-area:channels; background: rgba(14,14,16,.94); -webkit-backdrop-filter: none; backdrop-filter: none;
  border:1px solid var(--glass-border); border-radius:var(--radius); box-shadow:var(--shadow);
  overflow:hidden; display:flex; flex-direction:column;
}
.search-box{
  position:static; background: rgba(14,14,16,.94); padding:14px 12px 12px;
  border-bottom:1px solid var(--glass-border); z-index:2;
}
.search-field{position:relative}
.search-field svg{
  position:absolute; left:13px; top:50%; transform:translateY(-50%);
  width:17px; height:17px; color:var(--muted-2); pointer-events:none;
}
.search-box input[type=text]{
  width:100%; padding:11px 14px 11px 40px; background: var(--glass-2);
  border:1px solid var(--glass-border); border-radius:var(--radius-pill); color:var(--text);
  font-size:15px; font-family:inherit; transition:border-color .18s, box-shadow .18s, background .18s;
}
.search-box input[type=text]::placeholder{color:var(--muted-2)}
.search-box input[type=text]:focus{outline:none; border-color:var(--accent); background: var(--glass-3); box-shadow:0 0 0 4px var(--accent-soft)}
.channel-list{padding:8px; overflow-y:auto; flex:1}
.channel-item{
  padding:10px 12px; cursor:pointer; display:flex; gap:12px; align-items:center;
  border-radius:var(--radius-sm); margin-bottom:3px; transition:background .18s, transform .12s;
}
.channel-item:hover{background: var(--glass-2)}
.channel-item:active{transform:scale(.985)}
.channel-item.active{background: var(--accent-soft)}
.channel-item.blocked{opacity:.4}
.channel-item.blocked:hover{opacity:.7}
.channel-item .num{color:var(--muted-2); font-size:11px; font-family:ui-monospace,Menlo,monospace; min-width:26px; font-variant-numeric:tabular-nums}
.channel-item .info{flex:1; min-width:0}
.channel-item .name{font-size:14px; font-weight:600; letter-spacing:-.01em; display:flex; align-items:center; gap:6px; flex-wrap:wrap}
.channel-item .name .label{overflow:hidden; text-overflow:ellipsis; white-space:nowrap}
.channel-item .tagline{
  font-size:12px; color:var(--muted-2); margin-top:3px;
  overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
}
.channel-item .srv-badge{
  font-size:10px; font-weight:600; letter-spacing:.02em;
  padding:1px 6px 2px; border-radius:999px;
  background: var(--accent-soft); color:var(--accent);
  border:1px solid var(--glass-border);
  flex-shrink:0; line-height:1.4;
}
.channel-item .pop-badge{
  font-size:10px; font-weight:700; letter-spacing:.02em;
  padding:1px 6px 2px; border-radius:999px;
  background: rgba(255,69,58,.16); color:#ff6b6b;
  border:1px solid rgba(255,69,58,.32);
  flex-shrink:0; line-height:1.4;
  display:inline-flex; align-items:center; gap:3px;
}
.channel-item .pop-badge svg{width:10px; height:10px}

/* ===== Inline server picker (chips) =====
   Replaces the static "N server" badge. Each chip is a clickable server
   selector that plays this channel using that specific source. Small and
   touch-friendly (44px tap target on mobile per Apple HIG / WCAG). */
.srv-chips{
  display:flex; flex-wrap:wrap; gap:4px; margin-top:6px;
  scrollbar-width:none;
  -webkit-overflow-scrolling:touch;
  padding-bottom:2px;
}
.srv-chips::-webkit-scrollbar{display:none}
.srv-chip{
  display:inline-flex; align-items:center; justify-content:center;
  min-width:32px; height:26px; padding:0 9px;
  font-size:11px; font-weight:700; line-height:1; font-family:inherit;
  color:var(--muted); background: var(--glass-2);
  border:1px solid var(--glass-border); border-radius:8px;
  cursor:pointer; transition:all .15s; user-select:none;
  flex-shrink:0;
}
.srv-chip:hover{color:var(--text); background: var(--glass-3); border-color:var(--glass-border-strong)}
.srv-chip:focus-visible{outline:2px solid var(--accent); outline-offset:2px}
.srv-chip:active{transform:scale(.94)}
.srv-chip.cur{
  color:#000; background: var(--accent); border-color:var(--accent);
}
.srv-chip-label{
  font-size:10px; font-weight:600; color:var(--muted-2);
  align-self:center; padding:0 2px; flex-shrink:0;
}
@media (max-width:820px){
  /* WCAG / Apple HIG: ≥44pt touch target. */
  .srv-chip{min-width:44px; height:44px; padding:0 14px; font-size:13px}
  .srv-chips{gap:6px; padding:2px 0 6px}
}

/* ===== Channel cards (grid below player, Zentara-style) ===== */
.channel-list{
  display:grid; grid-template-columns:repeat(auto-fill, minmax(190px, 1fr));
  grid-auto-rows:max-content; gap:12px; align-content:start; padding:14px;
  flex:1; min-height:0; overflow-y:auto; overflow-x:hidden;
}
.channel-list .rec-section{grid-column:1 / -1}
.channel-list .ch-sentinel{grid-column:1 / -1; height:1px}
.channel-item{
  flex-direction:column; align-items:center; text-align:center; align-self:start;
  gap:8px; position:relative; margin-bottom:0; min-width:0; overflow:hidden;
  background:var(--glass-2); border:1px solid var(--glass-border);
}
.channel-item:hover{background:var(--glass-3); border-color:var(--glass-border-strong)}
.channel-item.active{background:var(--accent-soft); border-color:var(--accent)}
.channel-item .num{display:none}
.channel-item .ch-logo{width:62px; height:62px}
.channel-item .info{width:100%; min-width:0; text-align:center}
.channel-item .name{justify-content:center}
.channel-item .tagline{white-space:normal; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical}
.channel-item .srv-chips{justify-content:center}
.channel-item .ch-star{position:absolute; top:6px; right:6px}
.skel-row{flex-direction:column; align-items:center; text-align:center}
/* mobile overrides (placed after the base card rules so they win) */
@media (max-width:820px){
  .channel-list{grid-template-columns:repeat(2, minmax(0,1fr)); gap:8px; padding:8px}
  .player-wrap{height:auto; width:100%; max-width:100%; aspect-ratio:16/9}
  .player-info{max-width:100%; padding:10px 14px}
}

/* ===== Misc ===== */
.spinner{
  border:3px solid var(--glass-border); border-top-color:var(--accent);
  border-radius:50%; width:28px; height:28px;
  animation:spin .8s linear infinite; margin:30px auto;
}
@keyframes spin{to{transform:rotate(360deg)}}
.empty-note{color:var(--muted-2); text-align:center; padding:30px 20px; font-size:14px; line-height:1.6}
.toast{
  position:fixed; bottom:calc(80px + var(--safe-b)); left:50%; transform:translateX(-50%);
  background: var(--glass-3); -webkit-backdrop-filter:var(--blur); backdrop-filter:var(--blur);
  color:var(--text); padding:13px 20px; border-radius:var(--radius-pill);
  font-size:14px; font-weight:500; z-index:1000; max-width:86%;
  border:1px solid var(--glass-border-strong); box-shadow:var(--shadow);
  display:flex; align-items:center; gap:10px;
}
.toast::before{content:""; width:8px; height:8px; border-radius:50%; background: var(--danger); flex-shrink:0; box-shadow:0 0 8px var(--danger)}

/* ===== Custom video player ===== */
.player-shell{position:relative; width:100%; height:100%; background: #000; overflow:hidden}
.player-shell video{width:100%; height:100%; background: #000; display:block}

/* Forced landscape (CSS rotation). Rotates the WHOLE shell so the video +
   controls + overlays stay aligned. Used everywhere on iOS (no orientation
   API), and as fallback elsewhere. Uses 100vw/100vh (not dvh) so iOS Safari
   pushes the URL bar away — dvh keeps the URL bar visible. */
html.rebel-rot, body.rebel-rot{
  overflow:hidden !important;
  height:100vh !important;
  position:fixed !important;
  width:100%;
  inset:0;
}
.player-shell.rot{
  position:fixed; top:0; left:0; z-index:2000;
  width:100vh; height:100vw;
  transform-origin:top left;
  transform:rotate(90deg) translateY(-100%);
  background: #000;
}
.player-shell.rot video{width:100%; height:100%; transform:none; position:static}

/* center overlay: buffering + error */
.vcenter{
  position:absolute; inset:0; display:none; align-items:center; justify-content:center;
  flex-direction:column; gap:14px; text-align:center; padding:24px; pointer-events:none;
}
.vcenter.show{display:flex}
.vcenter .vspin{
  width:46px; height:46px; border:4px solid rgba(255,255,255,.22); border-top-color:var(--accent);
  border-radius:50%; animation:spin .8s linear infinite;
}
.vcenter .verr-ico{
  width:56px; height:56px; border-radius:50%; background: rgba(255,69,58,.16);
  border:1px solid rgba(255,69,58,.5); display:flex; align-items:center; justify-content:center;
}
.vcenter .verr-ico svg{width:30px; height:30px; color:var(--danger)}
.vcenter .verr-title{font-size:17px; font-weight:700; color:#fff; letter-spacing:-.01em}
.vcenter .verr-sub{font-size:13px; color:rgba(235,235,245,.7); line-height:1.5; max-width:340px}
.vcenter .verr-code{
  font-family:ui-monospace,Menlo,monospace; font-size:12px; color:var(--warn);
  background: rgba(0,0,0,.5); border:1px solid var(--glass-border-strong);
  padding:6px 12px; border-radius:8px; user-select:all;
}

/* control bar */
.vbar{
  position:absolute; left:0; right:0; bottom:0; z-index:5;
  display:flex; align-items:center; gap:10px; padding:10px 14px;
  background: linear-gradient(180deg,transparent,rgba(0,0,0,.7));
  opacity:1; transition:opacity .3s;
  /* NOTE: never set overflow:auto here — the settings menu is absolutely
     positioned inside .vmenu-wrap and would get clipped, making the gear
     button look broken on mobile. */
}
.vbar > *{flex-shrink:0}
.vbar .vspring{flex:1 1 auto; min-width:4px}
.player-shell.idle:not(.menu-open) .vbar{opacity:0}
.player-shell.idle:not(.menu-open){cursor:none}
.vbtn{
  background: none; border:none; color:#fff; cursor:pointer; padding:6px;
  display:flex; align-items:center; justify-content:center; border-radius:8px;
  transition:background .15s, transform .12s;
}
.vbtn:hover{background: rgba(255,255,255,.16)}
.vbtn:active{transform:scale(.9)}
.vbtn svg{width:22px; height:22px; display:block}
.vlive{
  display:flex; align-items:center; gap:7px; font-size:12px; font-weight:800;
  letter-spacing:.08em; color:#fff; padding:4px 10px; border-radius:var(--radius-pill);
  background: rgba(255,69,58,.92); text-transform:uppercase;
}
.vlive .ldot{width:7px; height:7px; border-radius:50%; background: #000;#fff; animation:lpulse 1.6s ease-in-out infinite}
@keyframes lpulse{0%,100%{opacity:1}50%{opacity:.3}}
.vvol{
  width:84px; height:4px; -webkit-appearance:none; appearance:none; cursor:pointer;
  background: rgba(255,255,255,.3); border-radius:4px; outline:none;
}
.vvol::-webkit-slider-thumb{-webkit-appearance:none; width:13px; height:13px; border-radius:50%; background: #000;#fff; cursor:pointer}

<script>
let allChannels = [];
let currentCountry = null;
let currentCountryName = null;
let hls = null;
let shakaPlayerInstance = null;
let flvPlayer = null;

// ===== State that persists across reloads =====
// Stored under a single key so the user can wipe everything by clearing it.
const LS_KEY = 'gesbohar:v1';
const store = (() => {
  let data = {};
  try { data = JSON.parse(localStorage.getItem(LS_KEY) || '{}') || {}; } catch(e){}
  const save = () => { try { localStorage.setItem(LS_KEY, JSON.stringify(data)); } catch(e){} };
  return {
    get: (k, dflt) => (k in data ? data[k] : dflt),
    set: (k, v) => { data[k] = v; save(); },
    del: (k) => { delete data[k]; save(); },
  };
})();

// In-memory cache of {countryCode -> channels[]}. Populated by loadChannels()
// so the global search can scan across every country the user has visited
// without re-fetching.
const channelCache = new Map();

// ===== Popularity (community trending) =====
// Channels other users played most often. Fetched on load + refreshed
// periodically. Renders in the "Populer" tab and as a hint above the channel
// list when the user is browsing "Semua".
let popularList = [];
async function refreshPopular() {
  try {
    const r = await fetch('https://seeking-trademark-plate-modifications.trycloudflare.com/api/popular?n=15');
    const data = await r.json();
    popularList = (data.channels || []).map(p => ({
      id:        p.key,
      name:      p.name,
      logo:      p.logo,
      tagline:   p.tagline,
      _cc:       p.cc,
      _ccName:   p.country,
      _popCount: p.count,
      // Make these objects look enough like real channels so they render
      // in buildChannelRow(). The user clicking one will try to find the
      // matching real entry in channelCache and play it; if not found we
      // load its country first.
      _popular:  true,
    }));
    document.getElementById('cntPopular').textContent = popularList.length;
  } catch(e) {}
}
function pingPlay(ch) {
  try {
    navigator.sendBeacon?.('/api/ping', new Blob([JSON.stringify({
      key:     chKey(ch),
      name:    ch.name || '',
      logo:    ch.logo || '',
      cc:      ch._cc || ch.country_tag || currentCountry || '',
      country: ch._ccName || currentCountryName || '',
      tagline: ch.tagline || '',
    })], {type: 'application/json'}));
  } catch(e) {}
}

// Channel-list view state: 'all' | 'fav' | 'recent' | 'global'
let chView = 'all';
let hideBlocked = store.get('hideBlocked', true);
let globalMode = false;

// Per-user failed-channel memory: keys of channels where every server returned
// an error in the player. Auto-expires after FAILED_TTL_MS so a CDN that
// recovers naturally comes back. Hidden together with `hideBlocked`—the same
// toggle reveals both server-marked dead and user-experienced dead channels.
const FAILED_TTL_MS = 24 * 60 * 60 * 1000;   // 24h
let failedChannels = store.get('failedChannels', {});
(function _gcFailed() {
  const now = Date.now();
  let changed = false;
  for (const k of Object.keys(failedChannels)) {
    if (typeof failedChannels[k] !== 'number' || (now - failedChannels[k]) > FAILED_TTL_MS) {
      delete failedChannels[k]; changed = true;
    }
  }
  if (changed) store.set('failedChannels', failedChannels);
})();
function markChannelFailed(ch) {
  if (!ch) return;
  const k = chKey(ch);
  failedChannels[k] = Date.now();
  store.set('failedChannels', failedChannels);
}
function unmarkChannelFailed(ch) {
  if (!ch) return;
  const k = chKey(ch);
  if (failedChannels[k]) { delete failedChannels[k]; store.set('failedChannels', failedChannels); }
}

// Currently-playing reference (used by prev/next + recent tracking).
let curList = [];          // the list the user is browsing (post-filter)
let curIndex = -1;         // index into curList of the playing channel
let curChannel = null;     // raw channel object

// ===== Favorites + Recents =====
function chKey(ch) {
  // Stable identity: prefer explicit id, fall back to name+country.
  return ch.id || `${ch.name || ''}|${ch.country_tag || currentCountry || ''}`;

const favs = new Set(store.get('favs', []));

// ===== Lazy library loader (hls.js / shaka / flv.js) =====
// First call kicks off a script tag and caches the promise. Subsequent calls
// reuse it. Keeps first paint fast — only the libraries the user actually
// needs get downloaded.
const LIBS = {
  hls:   'https://cdn.jsdelivr.net/npm/hls.js@1.5.13',
  shaka: 'https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.11/shaka-player.compiled.min.js',
  flv:   'https://cdn.jsdelivr.net/npm/flv.js@1.6.2/dist/flv.min.js',
};
const _libPromises = {};
function loadLib(name){
  if (_libPromises[name]) return _libPromises[name];
  _libPromises[name] = new Promise((resolve, reject) => {
    const s = document.createElement('script');
    s.src = LIBS[name];
    s.async = true;
    s.onload = () => resolve();
    s.onerror = () => { delete _libPromises[name]; reject(new Error('lib load failed: ' + name)); };
    document.head.appendChild(s);
  });
  return _libPromises[name];
}

    cc = upper.toLowerCase();  // standar ISO 3166-1 alpha-2
  }
  if (cc) {

const catCounts = new Map();
function setCatCount(code, n) {
  catCounts.set(code, n);
  document.querySelectorAll('#countries .country-item').forEach(div => {
    if (div.dataset.cc === code) {

// Gently prefetch counts so the category pills show numbers like the reference.
// Concurrency-limited; skips anything already known/cached. Categories only
// (country flags fill their count on first open) to keep the load light.
let _countPrefetchDone = false;
async function prefetchCounts(list) {
  if (_countPrefetchDone) return;
  _countPrefetchDone = true;
  const queue = list
    .filter(c => c.kind !== 'country' && !catCounts.has(c.code))
    .map(c => c.code);
  let i = 0;
  const worker = async () => {
    while (i < queue.length) {
      const code = queue[i++];
      try {
        if (channelCache.has(code)) { setCatCount(code, channelCache.get(code).length); continue; }
        const r = await fetch('https://seeking-trademark-plate-modifications.trycloudflare.com/api/channels/' + encodeURIComponent(code));
        const d = await r.json();
        if (Array.isArray(d.channels)) setCatCount(code, d.channels.length);
      } catch (e) { /* ignore individual failures */ }
    }
  };
  await Promise.all([worker(), worker()]);
}

// ===== Category bar scroll arrows =====
function updateCatNav() {
  const sc = document.getElementById('countries');
  const prev = document.getElementById('catPrev');
  const next = document.getElementById('catNext');
  if (!sc || !prev || !next) return;
  const max = sc.scrollWidth - sc.clientWidth;
  const hidden = max <= 2;
  prev.style.display = hidden ? 'none' : '';
  next.style.display = hidden ? 'none' : '';
  prev.disabled = sc.scrollLeft <= 2;
  next.disabled = sc.scrollLeft >= max - 2;
}
(function initCatNav() {
  const sc = document.getElementById('countries');
  const prev = document.getElementById('catPrev');
  const next = document.getElementById('catNext');
  if (!sc || !prev || !next) return;
  const step = () => Math.max(160, sc.clientWidth * 0.7);
  prev.addEventListener('click', () => sc.scrollBy({ left: -step(), behavior: 'smooth' }));
  next.addEventListener('click', () => sc.scrollBy({ left: step(), behavior: 'smooth' }));
  sc.addEventListener('scroll', updateCatNav, { passive: true });
  window.addEventListener('resize', updateCatNav);
  updateCatNav();
})();

async function loadCountries() {
  try {
    const r = await fetch("https://seeking-trademark-plate-modifications.trycloudflare.com/api/countries");
    const data = await r.json();
    if (data.error) throw new Error(data.error);
    const el = document.getElementById("countries");
    el.innerHTML = "";

    const cats = data.filter(c => c.kind !== "country");
    const countries = data.filter(c => c.kind === "country");

    const itemMap = new Map();
    const addItem = (c) => {
      const div = document.createElement("div");
      div.className = "country-item";
      div.dataset.cc = c.code;
      const known = catCounts.has(c.code);
      div.innerHTML = `${navItemHtml(c)}<span class="cname">${escapeHtml(c.name)}</span>` +
        `<span class="count${known ? ' show' : ''}">${known ? catCounts.get(c.code) : ''}</span>`;
      div.onclick = () => loadChannels(c.code, c.name, div);
      el.appendChild(div);
      itemMap.set(c.code, div);
    };
    const addHeader = (txt) => {
      const h = document.createElement("div");
      h.className = "nav-section";
      h.textContent = txt;
      el.appendChild(h);
    };

    if (cats.length) { addHeader("Kategori"); cats.forEach(addItem); }
    if (countries.length) { addHeader("Negara"); countries.forEach(addItem); }

    // Auto-restore last session
    const last = store.get('lastCountry');
    if (last && itemMap.has(last)) {
      const target = data.find(c => c.code === last);
      if (target) loadChannels(target.code, target.name, itemMap.get(last));
    }

    updateCatNav();
    prefetchCounts(data);
  } catch (e) {
    showToast("Gagal memuat kategori: " + e.message);
  }
}

// Virtualized chunked render: paint the first ~80 rows immediately, then
// stream more in as the user scrolls. Keeps long lists snappy on mobile.
let _renderCtx = null;
function renderChannels(list) {
  const el = document.getElementById("channels");
  el.innerHTML = "";
  if (list.length === 0) {
    el.innerHTML = '<div class="empty-note">Tidak ada channel yang cocok</div>';
    _renderCtx = null;
    return;
  }
  const CHUNK = 60;
  const recCount = list.reduce((n, c) => n + (c.recommended ? 1 : 0), 0);
  _renderCtx = { list, drawn: 0, hasRecommended: recCount > 0, recCount };
  drawChunk(CHUNK);
  // Auto-load more as user scrolls. Using a sentinel kept at list-bottom.
  if (list.length > CHUNK) {
    const sentinel = document.createElement('div');
    sentinel.style.height = '1px';
    sentinel.className = 'ch-sentinel';
    el.appendChild(sentinel);
    const io = new IntersectionObserver((entries) => {
      if (entries[0].isIntersecting && _renderCtx) {
        drawChunk(CHUNK);
        if (_renderCtx.drawn >= _renderCtx.list.length) {
          io.disconnect();
          sentinel.remove();
        }
      }
    }, { root: el, rootMargin: '300px' });
    io.observe(sentinel);
  }
}

function drawChunk(n) {
  if (!_renderCtx) return;
  const el = document.getElementById("channels");
  const frag = document.createDocumentFragment();
  const { list, drawn } = _renderCtx;
  const end = Math.min(drawn + n, list.length);
  // Track when we cross the boundary between recommended and regular rows so
  // we can drop a "Rekomendasi" header + a "Channel Lainnya" header inline.
  // Only show these in the "Semua" tab so other views (favorit/recent/popular)
  // stay clean.
  const wantSections = chView === 'all' && _renderCtx.hasRecommended;
  let prevRec = drawn > 0 ? !!list[drawn-1].recommended : null;
  for (let i = drawn; i < end; i++) {
    const ch = list[i];
    if (wantSections) {
      if (i === 0 && ch.recommended) {
        frag.appendChild(buildSectionHeader('Rekomendasi', _renderCtx.recCount + ' channel pilihan'));
      } else if (prevRec === true && !ch.recommended) {
        frag.appendChild(buildSectionHeader('Channel Lainnya', null));
      }
    }
    frag.appendChild(buildChannelRow(ch, i));
    prevRec = !!ch.recommended;
  }
  // Insert before sentinel (last child) if present
  const sentinel = el.lastElementChild;
  if (sentinel && sentinel.tagName === 'DIV' && sentinel.style.height === '1px') {
    el.insertBefore(frag, sentinel);
  } else {
    el.appendChild(frag);
  }
  _renderCtx.drawn = end;
}

function buildSectionHeader(title, sub) {
  const d = document.createElement('div');
  d.className = 'rec-section';
  d.innerHTML = `
    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l2.9 6.9 7.5.6-5.7 4.9 1.7 7.3L12 17.8 5.6 21.7l1.7-7.3L1.6 9.5l7.5-.6z"/></svg>
    <span>${escapeHtml(title)}</span>
    ${sub ? `<span class="rs-sub">${escapeHtml(sub)}</span>` : ''}`;
  return d;
}

function buildChannelRow(ch, i) {
  const div = document.createElement("div");
  div.className = "channel-item";
  if (ch.resolvable === false) div.classList.add("blocked");
  if (ch.recommended) div.classList.add("recommended");
  const isActive = curChannel && chKey(ch) === chKey(curChannel);
  if (isActive) div.classList.add('active');
  const nServers = (ch.servers && ch.servers.length) ? ch.servers.length : 1;
  const cc = (chView === 'global' || chView === 'fav' || chView === 'recent' || chView === 'popular') && ch._cc && ch._cc !== currentCountry
    ? `<span class="ch-cc">${escapeHtml(ch._cc)}</span>` : '';
  // Show play count in the "Populer" tab so users see the social proof.
  const popInfo = chView === 'popular' && ch._popCount
    ? `<span class="pop-badge"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M13 2c0 5 5 5 5 11a6 6 0 11-12 0c0-2 1-4 3-5 0 3 2 4 2 4s-1-4 2-10z"/></svg>${ch._popCount}</span>`
    : '';
  // Recommended badge (e.g. official FIFA / live event feeds in WC26).
  const recBadge = ch.recommended
    ? `<span class="rec-badge"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l2.9 6.9 7.5.6-5.7 4.9 1.7 7.3L12 17.8 5.6 21.7l1.7-7.3L1.6 9.5l7.5-.6z"/></svg>Rekomendasi</span>`
    : '';
  // Inline server picker (chips). Replaces the static badge — each chip
  // plays this channel using that specific source. Active server gets
  // accent-colored. Single-server channels just don't render this.
  let chipsHtml = '';
  if (nServers > 1) {
    const curIdx = isActive ? (window.__curServerIdx || 0) : -1;
    const items = ch.servers.map((s, idx) => {
      const lbl = (s.label || ('S' + (idx + 1))).replace(/^Server\s*/i, 'S');
      const sel = idx === curIdx ? ' cur' : '';
      const fullLabel = s.label || ('Server ' + (idx + 1));
      return `<button class="srv-chip${sel}" type="button" data-srv="${idx}" title="${escapeHtml(fullLabel)}" aria-label="Pakai ${escapeHtml(fullLabel)}"${idx === curIdx ? ' aria-current="true"' : ''}>${escapeHtml(lbl)}</button>`;
    }).join('');
    chipsHtml = `<div class="srv-chips"><span class="srv-chip-label">Server:</span>${items}</div>`;
  }
  const starOn = isFav(ch);
  div.innerHTML = `
    <span class="num">${(i+1).toString().padStart(3,'0')}</span>
    ${chLogoHtml(ch)}
    <div class="info">
      <div class="name"><span class="label">${escapeHtml(ch.name)}</span>${recBadge}${popInfo}${cc}</div>
      ${ch.tagline ? '<div class="tagline">' + escapeHtml(ch.tagline) + '</div>' : ''}
      ${chipsHtml}
    </div>
    <button class="ch-star${starOn ? ' on' : ''}" type="button" aria-label="Favoritkan">${starOn ? ICON.starOn : ICON.starOff}</button>`;
  div.onclick = (ev) => {
    // Star toggles favorite, not playback
    const star = ev.target.closest('.ch-star');
    if (star) {
      ev.stopPropagation();
      toggleFav(ch);
      star.classList.toggle('on');
      star.innerHTML = isFav(ch) ? ICON.starOn : ICON.starOff;
      if (chView === 'fav') applyFilters();
      return;
    }
    // Server chip → play with that specific source
    const chip = ev.target.closest('.srv-chip');
    if (chip) {
      ev.stopPropagation();
      const idx = parseInt(chip.getAttribute('data-srv'), 10) || 0;
      playChannel(ch, div, idx);
      return;
    }
    // "Populer" rows can be bare snapshots (no url) when the user hasn't
    // loaded that country yet. Hydrate first, then play.
    if (ch._popular && !ch.url && !ch.servers && ch._cc) {
      showToast('Memuat ' + (ch._ccName || ch._cc) + '…');
      fetch('https://seeking-trademark-plate-modifications.trycloudflare.com/api/channels/' + encodeURIComponent(ch._cc))
        .then(r => r.json())
        .then(data => {
          if (!data.channels) throw new Error(data.error || 'kosong');
          const arr = data.channels.map(c => ({ ...c, _cc: c.country_tag || ch._cc, _ccName: ch._ccName }));
          channelCache.set(ch._cc, arr);
          const real = arr.find(c => chKey(c) === chKey(ch));
          if (real) playChannel(real, div);
          else showToast('Channel tidak ditemukan');
        })
        .catch(e => showToast('Gagal: ' + e.message));
      return;
    }
    playChannel(ch, div);
  };
  return div;
}
