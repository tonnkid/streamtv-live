const ICON = {
  play:   '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 5.5v13l11-6.5z"/></svg>',
  pause:  '<svg viewBox="0 0 24 24" fill="currentColor"><rect x="6.5" y="5.5" width="3.6" height="13" rx="1"/><rect x="13.9" y="5.5" width="3.6" height="13" rx="1"/></svg>',
  volume: '<svg viewBox="0 0 24 24" fill="none"><path d="M5 9v6h4l5 4V5L9 9H5z" fill="currentColor"/><path d="M16.5 8.5a5 5 0 010 7M18.8 6a8 8 0 010 12" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/></svg>',
  muted:  '<svg viewBox="0 0 24 24" fill="none"><path d="M5 9v6h4l5 4V5L9 9H5z" fill="currentColor"/><path d="M17 9.5l4 5M21 9.5l-4 5" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/></svg>',
  gear:   '<svg viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="3.2" stroke="currentColor" stroke-width="1.7"/><path d="M19.4 13.5a7.7 7.7 0 000-3l1.7-1.3-1.8-3.1-2 .8a7.6 7.6 0 00-2.6-1.5L14.3 3h-3.6l-.4 2.1a7.6 7.6 0 00-2.6 1.5l-2-.8L3.9 8.9l1.7 1.3a7.7 7.7 0 000 3l-1.7 1.3 1.8 3.1 2-.8a7.6 7.6 0 002.6 1.5l.4 2.1h3.6l.4-2.1a7.6 7.6 0 002.6-1.5l2 .8 1.8-3.1-1.7-1.3z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/></svg>',
  rotate: '<svg viewBox="0 0 24 24" fill="none"><rect x="2.5" y="6.5" width="14" height="11" rx="2" stroke="currentColor" stroke-width="1.7"/><path d="M19 9.5a6 6 0 01-1 9M21 15.5l-2 3-3-2" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/></svg>',
  expand: '<svg viewBox="0 0 24 24" fill="none"><path d="M4 9V5.5a1.5 1.5 0 011.5-1.5H9M20 9V5.5A1.5 1.5 0 0018.5 4H15M4 15v3.5A1.5 1.5 0 005.5 20H9M20 15v3.5a1.5 1.5 0 01-1.5 1.5H15" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>',
  check:  '<svg viewBox="0 0 24 24" fill="none"><path d="M5 12.5l4.5 4.5L19 7" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>',
  warn:   '<svg viewBox="0 0 24 24" fill="none"><path d="M12 3l9.5 16.5h-19L12 3z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/><path d="M12 9.5v4.5M12 17h.01" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>',
  pip:    '<svg viewBox="0 0 24 24" fill="none"><rect x="2.5" y="4.5" width="19" height="13" rx="2" stroke="currentColor" stroke-width="1.7"/><rect x="12" y="11" width="8" height="6" rx="1" fill="currentColor"/></svg>',
  prev:   '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M7 5h2v14H7zM20 5l-9 7 9 7z"/></svg>',
  next:   '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M15 5h2v14h-2zM4 5l9 7-9 7z"/></svg>',
  retry:  '<svg viewBox="0 0 24 24" fill="none"><path d="M3.5 12a8.5 8.5 0 1014.4-6.1L21 9" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/><path d="M21 4v5h-5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>',
  starOn: '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l2.9 6.9 7.5.6-5.7 4.9 1.7 7.3L12 17.8 5.6 21.7l1.7-7.3L1.6 9.5l7.5-.6z"/></svg>',
  starOff:'<svg viewBox="0 0 24 24" fill="none"><path d="M12 2l2.9 6.9 7.5.6-5.7 4.9 1.7 7.3L12 17.8 5.6 21.7l1.7-7.3L1.6 9.5l7.5-.6L12 2z" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/></svg>',
};

function playChannel(ch, btn, preferIdx) {
  // Abort any previous playback session so its event listeners (document /
  // window level) get removed automatically. This is what stops the
  // "listeners stack up after 10 channel switches" bug.
  if (window.__rebelPlayCtl) {
    try { window.__rebelPlayCtl.abort(); } catch(e){}
  }
  const playCtl = new AbortController();
  window.__rebelPlayCtl = playCtl;
  const sig = playCtl.signal;

  document.querySelectorAll(".channel-item").forEach(x => x.classList.remove("active"));
  btn.classList.add("active");

  // Track for prev/next + recents
  curChannel = ch;
  curIndex = curList.findIndex(c => chKey(c) === chKey(ch));
  pushRecent(ch);
  pingPlay(ch);

  const wrap = document.getElementById("playerWrap");
  wrap.innerHTML = `
    <div class="player-shell" id="pshell">
      <video id="vid" autoplay playsinline></video>
      <div class="vcenter" id="vcenter"></div>
      <div class="vbar" id="vbar">
        <button class="vbtn" id="vPlay" aria-label="Play/Pause"></button>
        <button class="vbtn" id="vPrev" aria-label="Channel sebelumnya">${ICON.prev}</button>
        <button class="vbtn" id="vNext" aria-label="Channel berikutnya">${ICON.next}</button>
        <span class="vlive"><span class="ldot"></span>Live</span>
        <button class="vbtn" id="vMute" aria-label="Mute"></button>
        <input type="range" class="vvol" id="vVol" min="0" max="1" step="0.05" value="1" aria-label="Volume">
        <div class="vspring"></div>
        <div class="vmenu-wrap">
          <button class="vbtn" id="vSettings" aria-label="Pengaturan">${ICON.gear}</button>
          <div class="vmenu" id="vMenu"></div>
        </div>
        <button class="vbtn" id="vPip" aria-label="Picture in Picture" title="Picture in Picture (P)">${ICON.pip}</button>
        <button class="vbtn" id="vRotate" aria-label="Putar layar">${ICON.rotate}</button>
        <button class="vbtn" id="vFull" aria-label="Layar penuh">${ICON.expand}</button>
      </div>
    </div>`;

  const shell = document.getElementById("pshell");
  const vid = document.getElementById("vid");
  const vcenter = document.getElementById("vcenter");
  const vbar = document.getElementById("vbar");
  const vPlay = document.getElementById("vPlay");
  const vPrev = document.getElementById("vPrev");
  const vNext = document.getElementById("vNext");
  const vMute = document.getElementById("vMute");
  const vVol = document.getElementById("vVol");
  const vSettings = document.getElementById("vSettings");
  const vMenu = document.getElementById("vMenu");
  const vPip = document.getElementById("vPip");
  const vRotate = document.getElementById("vRotate");
  const vFull = document.getElementById("vFull");

  // Restore persisted volume/mute immediately so the user never gets
  // surprise-blasted with audio.
  bindVolumePersistence();
  if (vVol) vVol.value = vid.muted ? 0 : vid.volume;

  // Prev/next wiring + initial enabled state
  vPrev.onclick = () => playRel(-1);
  vNext.onclick = () => playRel(+1);
  updatePrevNext();

  // Picture-in-picture
  if (!('pictureInPictureEnabled' in document) || !document.pictureInPictureEnabled) {
    vPip.style.display = 'none';
  } else {
    vPip.onclick = async () => {
      try {
        if (document.pictureInPictureElement) await document.exitPictureInPicture();
        else await vid.requestPictureInPicture();
      } catch(e) { showToast('PiP gagal: ' + (e.message || e)); }
    };
  }

  // ---- center overlay helpers ----
  function showBusy() {
    vcenter.className = "vcenter show";
    vcenter.innerHTML = `<div class="vspin"></div>`;
    // Safety timeout: if the spinner stays visible for 30s without any
    // event clearing it, force a tap-to-play prompt so mobile users
    // (where autoplay is blocked) aren't stuck forever. Cleared by
    // clearOverlay() / showError() / showTapToPlay().
    clearTimeout(window.__rebelBusyTimer);
    window.__rebelBusyTimer = setTimeout(() => {
      if (vcenter.classList.contains('show') && vcenter.querySelector('.vspin')) {
        showTapToPlay();
      }
    }, 30000);
  }
  function showTapToPlay() {
    clearTimeout(window.__rebelBusyTimer);
    vcenter.className = "vcenter show";
    vcenter.innerHTML =
      `<div style="width:64px;height:64px;border-radius:50%;background: var(--accent);display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 8px 24px rgba(48,209,88,.45);transition:transform .12s,filter .15s;"
            onclick="var v=document.getElementById('vid');if(v){v.play().catch(function(){});this.closest('.vcenter').className='vcenter';}"
            onmouseover="this.style.filter='brightness(1.08)'" onmouseout="this.style.filter=''"
            ontouchstart="this.style.transform='scale(.94)'" ontouchend="this.style.transform=''">
         <svg width="28" height="28" viewBox="0 0 24 24" fill="#000"><path d="M8 5.5v13l11-6.5z"/></svg>
       </div>
       <div style="font-size:14px;color:rgba(235,235,245,.7);">Ketuk untuk mulai</div>`;
  }
  function clearOverlay() {
    clearTimeout(window.__rebelBusyTimer);
    vcenter.className = "vcenter"; vcenter.innerHTML = "";
    // Successful playback: if this channel was previously marked failed,
    // clear that mark so it returns to the visible list.
    unmarkChannelFailed(curChannel);
  }
  function showError(title, code) {
    clearTimeout(window.__rebelBusyTimer);
    // All servers exhausted — remember this channel as failed so it gets
    // auto-hidden from the list (until the 24h TTL expires or the user
    // toggles "show unavailable channels").
    markChannelFailed(curChannel);
    vcenter.className = "vcenter show";
    // Map cryptic engine codes to human-friendly messages.
    const codeStr = code != null ? String(code) : '';
    const friendly = friendlyError(codeStr) || 'Channel tidak dapat diputar. Coba lagi, atau lompat ke channel berikutnya.';
    vcenter.innerHTML =
      `<div class="verr-ico">${ICON.warn}</div>` +
      `<div class="verr-title">${escapeHtml(title)}</div>` +
      `<div class="verr-sub">${escapeHtml(friendly)}</div>` +
      (codeStr ? `<div class="verr-code">Kode error: ${escapeHtml(codeStr)}</div>` : '') +
      `<div class="vretry-row"><button class="vretry" type="button">${ICON.retry} Coba lagi</button>` +
      (curIndex >= 0 && curIndex < curList.length - 1
        ? `<button class="vnext" type="button">Channel berikutnya →</button>` : '') +
      `</div>`;
    const retry = vcenter.querySelector('.vretry');
    if (retry) retry.onclick = () => { showBusy(); tryServer(0, true); };
    const nx = vcenter.querySelector('.vnext');
    if (nx) nx.onclick = () => playRel(+1);
  }
  showBusy();

  // ---- play/pause ----
  function syncPlayIcon() { vPlay.innerHTML = vid.paused ? ICON.play : ICON.pause; }
  vPlay.onclick = () => { vid.paused ? vid.play().catch(()=>{}) : vid.pause(); };
  vid.addEventListener("play", syncPlayIcon);
  vid.addEventListener("pause", syncPlayIcon);
  syncPlayIcon();

  // ---- volume / mute ----
  function syncMuteIcon() { vMute.innerHTML = (vid.muted || vid.volume === 0) ? ICON.muted : ICON.volume; }
  vMute.onclick = () => { vid.muted = !vid.muted; if (!vid.muted && vid.volume === 0) vid.volume = 1; syncMuteIcon(); vVol.value = vid.muted ? 0 : vid.volume; };
  vVol.oninput = () => { vid.volume = parseFloat(vVol.value); vid.muted = vid.volume === 0; syncMuteIcon(); };
  vid.addEventListener("volumechange", syncMuteIcon);
  syncMuteIcon();

  // ---- buffering state ----
  vid.addEventListener("playing", clearOverlay);
  vid.addEventListener("waiting", showBusy);

  // ---- settings menu (resolution) ----
  function positionMenu() {
    // Anchor above the gear button (or below it if there's no room above —
    // happens when the player is short and rendered near the top of the
    // viewport, e.g. in fullscreen). Clamp horizontally so it never spills
    // off the right edge on narrow phones.
    const r = vSettings.getBoundingClientRect();
    // Force layout to know real menu size.
    vMenu.style.left = '0px'; vMenu.style.top = '0px';
    const mw = vMenu.offsetWidth || 240;
    const mh = vMenu.offsetHeight || 280;
    const vw = window.innerWidth, vh = window.innerHeight;
    let left = Math.min(Math.max(8, r.right - mw), vw - mw - 8);
    let top  = r.top - mh - 8;
    if (top < 8) top = Math.min(vh - mh - 8, r.bottom + 8);
    vMenu.style.left = left + 'px';
    vMenu.style.top  = top + 'px';
  }
  function setMenuOpen(open) {
    vMenu.classList.toggle("show", open);
    shell.classList.toggle("menu-open", open);
    if (open) {
      vMenu.scrollTop = 0;
      positionMenu();
      poke();
    }
  }
  // Reposition on resize / scroll while open so it doesn't drift off-anchor.
  window.addEventListener('resize', () => { if (vMenu.classList.contains('show')) positionMenu(); }, {signal: sig});
  window.addEventListener('scroll', () => { if (vMenu.classList.contains('show')) positionMenu(); }, {capture: true, signal: sig});
  vSettings.onclick = (e) => {
    e.stopPropagation();
    setMenuOpen(!vMenu.classList.contains("show"));
  };
  // Close on outside tap. Use both click + touchstart so iOS Safari handles
  // it identically. Skip when the target is inside the menu (so scrolling /
  // tapping items doesn't dismiss the panel mid-interaction).
  function onOutsideTap(e) {
    if (!vMenu.classList.contains("show")) return;
    if (vMenu.contains(e.target) || vSettings.contains(e.target)) return;
    setMenuOpen(false);
  }
  document.addEventListener("click", onOutsideTap, {signal: sig});
  document.addEventListener("touchstart", onOutsideTap, {passive: true, signal: sig});
  // Prevent taps/touch-scroll inside the menu from bubbling to the player
  // shell (which would toggle play/pause or close the menu).
  ["click","touchstart","touchmove","touchend","wheel","pointerdown"].forEach(ev => {
    vMenu.addEventListener(ev, e => e.stopPropagation(), {passive:true});
  });

  // ---- rotate / fullscreen-landscape (mobile) ----
  // Two separate behaviors share the player toolbar:
  //   - vRotate: "putar layar" — force CSS landscape rotation. Works
  //     everywhere (iOS included) because we rotate the player element
  //     ourselves; no Screen Orientation API needed.
  //   - vFull:   "layar penuh" — true OS fullscreen. On Android we hit
  //     the Fullscreen API + lock orientation. On iOS the only option
  //     is `vid.webkitEnterFullscreen()` (native iOS video player —
  //     auto-rotates to landscape when device is held that way).
  const ua = navigator.userAgent || '';
  const isIOS = /iPad|iPhone|iPod/.test(ua) ||
                (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);

  async function enterLandscape() {
    // iOS Safari: the ONLY way to truly hide the URL bar + bottom toolbar
    // is the native video-element fullscreen. The OS auto-rotates to
    // landscape when the device is held that way. Trade-off: our custom
    // controls swap out for Apple's stock player (same behavior as the
    // YouTube/Twitch mobile web players on iPhone).
    if (isIOS && vid.webkitEnterFullscreen) {
      try { vid.webkitEnterFullscreen(); return true; } catch(e){}
    }
    // Android + desktop: real Fullscreen API + orientation lock.
    try {
      if (shell.requestFullscreen) await shell.requestFullscreen({navigationUI:'hide'}).catch(()=>shell.requestFullscreen());
      else if (shell.webkitRequestFullscreen) shell.webkitRequestFullscreen();
      if (screen.orientation && screen.orientation.lock) {
        try { await screen.orientation.lock('landscape'); return true; }
        catch (e) {}
      }
    } catch(e) {}
    // Fallback (older Android browsers): CSS rotate + body-scroll lock.
    shell.classList.add('rot');
    document.documentElement.classList.add('rebel-rot');
    document.body.classList.add('rebel-rot');
    window.scrollTo(0, 1);
    setTimeout(() => window.scrollTo(0, 1), 80);
    return true;
  }
  async function exitLandscape() {
    try { if (screen.orientation && screen.orientation.unlock) screen.orientation.unlock(); } catch(e){}
    if (document.fullscreenElement) await document.exitFullscreen();
    shell.classList.remove('rot');
    document.documentElement.classList.remove('rebel-rot');
    document.body.classList.remove('rebel-rot');
  }
  function isLandscapeActive() {
    return shell.classList.contains('rot') ||
      (document.fullscreenElement === shell);
  }
  vRotate.onclick = () => isLandscapeActive() ? exitLandscape() : enterLandscape();
  document.addEventListener('fullscreenchange', () => {
    if (!document.fullscreenElement) {
      shell.classList.remove('rot');
      document.documentElement.classList.remove('rebel-rot');
      document.body.classList.remove('rebel-rot');
    }
  }, {signal: sig});
  // iOS: user tapped "Done" in the native player.
  vid.addEventListener('webkitendfullscreen', () => {
    shell.classList.remove('rot');
    document.documentElement.classList.remove('rebel-rot');
    document.body.classList.remove('rebel-rot');
  });

  // ---- fullscreen ----
  // Native fullscreen. On iOS this is the only way to actually hide Safari's
  // URL bar — at the cost of replacing our controls with iOS's stock player.
  vFull.onclick = () => {
    if (isIOS && vid.webkitEnterFullscreen) {
      try { vid.webkitEnterFullscreen(); return; } catch(e){}
    }
    if (document.fullscreenElement) document.exitFullscreen();
    else (shell.requestFullscreen ? shell.requestFullscreen() : vid.webkitEnterFullscreen?.());
  };

  // ---- auto-hide control bar ----
  let idleTimer;
  function poke() {
    shell.classList.remove("idle");
    clearTimeout(idleTimer);
    idleTimer = setTimeout(() => { if (!vid.paused) shell.classList.add("idle"); }, 2800);
  }
  shell.addEventListener("mousemove", poke);
  shell.addEventListener("touchstart", poke, {passive:true});
  poke();

  // Cleanup previous
  if (hls) { try { hls.destroy(); } catch(e){} hls = null; }
  if (shakaPlayerInstance) { try { shakaPlayerInstance.destroy(); } catch(e){} shakaPlayerInstance = null; }
  if (flvPlayer) { try { flvPlayer.destroy(); } catch(e){} flvPlayer = null; }

  document.getElementById("playerInfo").style.display = "flex";
  document.getElementById("curTitle").textContent = ch.name;

  // ==================== Multi-server playback ====================
  // Build the server list. Single-server channels are promoted server-side
  // so ch.url is already a /proxy?id=<token> URL.
  const servers = (ch.servers && ch.servers.length) ? ch.servers : [{
    label:    'Default',
    url:      ch.url,
    type:     ch.type,
    clearkeys: ch.clearkeys, is_drm: ch.is_drm,
  }];
  let curServer = 0;
  let levelsCache = [];
  let getCurLevel = null;
  let setCurLevel = null;
  function cleanupPlayers() {
    if (hls) { try { hls.destroy(); } catch(e){} hls = null; }
    if (shakaPlayerInstance) { try { shakaPlayerInstance.destroy(); } catch(e){} shakaPlayerInstance = null; }
    if (flvPlayer) { try { flvPlayer.destroy(); } catch(e){} flvPlayer = null; }
    try { vid.removeAttribute('src'); vid.load(); } catch(e){}
  }

  function fmtLevel(l) {
    const mbps = l.bitrate ? (l.bitrate/1e6).toFixed(2) + ' Mbps' : '';
    return l.height ? `${l.height}p${mbps ? ' · ' + mbps : ''}` : (mbps || 'Track');
  }

  function rebuildMenu() {
    // Server picker now lives inline on the channel row as chips, so the
    // gear-menu only shows quality. Keeps the menu short and focused.
    let html = '';
    html += `<div class="vmh">Kualitas</div>`;
    if (!levelsCache.length) {
      html += `<div class="vmi sel"><span>Otomatis</span><span class="vchk">${ICON.check}</span></div>`;
    } else {
      html += `<div class="vmi" data-lvl="-1"><span>Otomatis</span><span class="vchk">${ICON.check}</span></div>`;
      levelsCache.slice().sort((a,b) => (b.height||0) - (a.height||0)).forEach(l => {
        html += `<div class="vmi" data-lvl="${l.idx}"><span>${fmtLevel(l)}</span><span class="vchk">${ICON.check}</span></div>`;
      });
    }
    vMenu.innerHTML = html;
    vMenu.querySelectorAll('[data-lvl]').forEach(el => {
      el.onclick = () => {
        const lvl = parseInt(el.getAttribute('data-lvl'), 10);
        if (setCurLevel) setCurLevel(lvl);
        setMenuOpen(false);
        refreshLevelSel();
      };
    });
    refreshLevelSel();
  }

  function refreshLevelSel() {
    if (!getCurLevel) return;
    const cur = getCurLevel();
    vMenu.querySelectorAll('[data-lvl]').forEach(el => {
      const lvl = parseInt(el.getAttribute('data-lvl'), 10);
      el.classList.toggle('sel', lvl === cur || (cur === -1 && lvl === -1));
    });
  }

  function onLevels(levels, getCur, setLvl) {
    levelsCache = levels || [];
    getCurLevel = getCur || null;
    setCurLevel = setLvl || null;
    rebuildMenu();
  }

  // Called when current server fails. If more servers, try next silently.
  // Otherwise surface the error to the user.
  function onServerFail(title, code) {
    console.warn(`[server ${curServer+1}/${servers.length}] failed:`, title, code);
    if (curServer + 1 < servers.length) {
      tryServer(curServer + 1, false);
    } else {
      showError(title, code);
    }
  }

  async function tryServer(idx, userInitiated) {
    curServer = idx;
    window.__curServerIdx = idx;
    // Update inline server chips in the channel list so the highlighted
    // server matches what's actually playing.
    document.querySelectorAll('.channel-item.active .srv-chip').forEach(c => {
      const ci = parseInt(c.getAttribute('data-srv'), 10);
      c.classList.toggle('cur', ci === idx);
    });
    const srv = servers[idx];
    if (!srv || !srv.url) { onServerFail('URL kosong', 'NO_URL'); return; }

    showBusy();
    cleanupPlayers();
    levelsCache = []; getCurLevel = null; setCurLevel = null;
    rebuildMenu();

    // Media error listener per-playback-session — removed by AbortController
    // when user switches channel, preventing leaks.
    vid.addEventListener('error', () => {
      if (vid.error) onServerFail('Gagal memutar video', 'MEDIA_' + vid.error.code);
    }, {signal: sig});

    // Server-side already returns a fully-baked /proxy?id=<token> URL with
    // the upstream + headers encoded as an opaque token, so we just use it
    // as-is. This keeps real CDN URLs out of the browser DevTools.
    const proxyUrl = srv.url;

    if (srv.type === 'flv') {
      try { await loadLib('flv'); }
      catch(e) { onServerFail('Gagal memuat FLV library', 'FLV_LOAD'); return; }
      if (!window.flvjs || !flvjs.isSupported()) { onServerFail('FLV tidak didukung browser ini', 'FLV_UNSUPPORTED'); return; }
      flvPlayer = flvjs.createPlayer(
        { type: 'flv', url: proxyUrl, isLive: true, cors: true },
        { enableWorker: false, enableStashBuffer: false, stashInitialSize: 128 }
      );
      flvPlayer.attachMediaElement(vid);
      flvPlayer.load();
      flvPlayer.play().catch(e => { console.warn('Autoplay blocked:', e); showTapToPlay(); });
      flvPlayer.on(flvjs.Events.ERROR, (errType, errDetail) => {
        console.error('FLV error:', errType, errDetail);
        onServerFail('Stream tidak merespons', 'FLV_' + errDetail);
      });
      onLevels([]);
    } else if (srv.type === 'hls') {
      // Native Safari HLS doesn't need the library; only download hls.js when
      // the browser can't play HLS on its own.
      const needsLib = !(vid.canPlayType('application/vnd.apple.mpegurl'));
      if (needsLib) {
        try { await loadLib('hls'); }
        catch(e) { onServerFail('Gagal memuat HLS library', 'HLS_LOAD'); return; }
      }
      if (window.Hls && Hls.isSupported()) {
        // Buffer config: keep startup quick but cushion enough live buffer
        // (90s target) that ISP jitter doesn't cause stalls. Low-latency
        // mode is OFF because it makes the player chase the live edge
        // aggressively, which on shaky mobile networks turns into
        // rebuffering every few seconds.
        hls = new Hls({
          // Target ~90s of buffer ahead. Real-world live HLS segments are
          // 4-10s, so this is 9-22 segments — enough to absorb a missed
          // segment fetch without stalling.
          maxBufferLength: 90,
          maxMaxBufferLength: 180,
          backBufferLength: 60,
          liveDurationInfinity: true,
          // ABR picks the right rendition automatically. Starting at the
          // smallest segment means first frame in ~2-4s on any connection.
          startLevel: -1,
          autoStartLoad: true,
          // Bigger watchdog window — don't nudge the playhead on every
          // tiny stall, just wait for the buffer to catch up.
          maxBufferHole: 1.0,
          highBufferWatchdogPeriod: 3,
          nudgeMaxRetry: 10,
          // OFF: low-latency only helps if upstream advertises LL-HLS
          // (rare) and hurts on unstable connections by chasing live edge.
          lowLatencyMode: false,
          // Stay 6s behind live so we always have something queued —
          // matches what Twitch / mainstream players do.
          liveSyncDuration: 6,
          liveMaxLatencyDuration: 30,
          capLevelToPlayerSize: false,
          abrEwmaDefaultEstimate: 8_000_000,    // 8 Mbps default — realistic
          abrBandWidthFactor: 0.8,              // use 80% of measured BW (headroom)
          abrBandWidthUpFactor: 0.6,            // climb slowly to higher quality
          debug: false,
          xhrSetup: (xhr) => { xhr.timeout = 25000; },
        });
        hls.loadSource(proxyUrl);
        hls.attachMedia(vid);
        hls.on(Hls.Events.MANIFEST_PARSED, () => {
          vid.play().catch(() => { syncPlayIcon(); showTapToPlay(); });
          const levels = (hls.levels || []).map((l, i) => ({ idx: i, height: l.height, bitrate: l.bitrate }));
          // Let ABR pick the best rendition based on real network speed
          // measured during the first couple segments — much better startup
          // than pinning to the highest level immediately, which often
          // stalls for 10s+ on phones / slow connections before the first
          // HD segment finishes downloading.
          // The user can still pin a specific quality from the settings menu.
          onLevels(levels, () => hls.currentLevel, (i) => { hls.currentLevel = i; hls.loadLevel = i; });
        });
        hls.on(Hls.Events.LEVEL_SWITCHED, refreshLevelSel);
        hls.on(Hls.Events.ERROR, (ev, data) => {
          console.error('HLS error:', data);
          if (!data.fatal) return;
          if (data.type === Hls.ErrorTypes.MEDIA_ERROR) {
            try { hls.recoverMediaError(); return; } catch(e){}
          }
          const code = (data.response && data.response.code) ? data.response.code : data.details;
          onServerFail(
            data.type === Hls.ErrorTypes.NETWORK_ERROR ? 'Server stream tidak merespons' : 'Stream error',
            'HLS_' + code
          );
        });
      } else if (vid.canPlayType('application/vnd.apple.mpegurl')) {
        vid.src = proxyUrl;
        vid.play().catch(()=>{ syncPlayIcon(); showTapToPlay(); });
        onLevels([]);
      } else {
        onServerFail('HLS tidak didukung browser ini', 'HLS_UNSUPPORTED');
      }
    } else {
      try { await loadLib('shaka'); }
      catch(e) { onServerFail('Player gagal dimuat', 'SHAKA_LOAD'); return; }
      const shakaLib = window.shaka;
      if (!shakaLib) { onServerFail('Player gagal dimuat', 'SHAKA_MISSING'); return; }
      shakaLib.polyfill.installAll();
      if (!shakaLib.Player.isBrowserSupported()) { onServerFail('Browser tidak didukung', 'SHAKA_UNSUPPORTED'); return; }
      shakaPlayerInstance = new shakaLib.Player(vid);
      // Buffer config: deep enough to absorb network jitter (90s target),
      // ABR enabled so it picks the right rendition for the actual network.
      shakaPlayerInstance.configure({
        streaming: {
          bufferingGoal: 90,
          rebufferingGoal: 4,
          bufferBehind: 60,
          // Retry segments faster + more times before giving up.
          retryParameters: {
            timeout: 25000,
            stallTimeout: 10000,
            connectionTimeout: 8000,
            maxAttempts: 4,
            baseDelay: 400,
            backoffFactor: 1.5,
            fuzzFactor: 0.5,
          },
        },
        abr: {
          enabled: true,
          defaultBandwidthEstimate: 8_000_000,
          // Use 80% of measured bandwidth (headroom for jitter).
          bandwidthDowngradeTarget: 0.95,
          bandwidthUpgradeTarget: 0.7,
          restrictions: { minHeight: 0, maxHeight: Infinity, maxBandwidth: Infinity },
        },
      });
      if (srv.clearkeys && srv.clearkeys.length > 0) {
        const ckMap = {};
        for (const k of srv.clearkeys) ckMap[k.kid] = k.key;
        shakaPlayerInstance.configure({ drm: { clearKeys: ckMap } });
      }
      shakaPlayerInstance.addEventListener('error', e => {
        const detail = e.detail || e;
        console.error('Shaka error:', detail);
        const critical = detail && detail.severity === 2;
        const stalled = vid.paused || vid.readyState < 3;
        if (critical && stalled) {
          onServerFail('Stream error', 'SHAKA_' + (detail.code || detail.message || 'unknown'));
        }
      });
      const mime = srv.type === 'hls' ? 'application/x-mpegurl' : 'application/dash+xml';
      shakaPlayerInstance.load(proxyUrl, null, mime).then(() => {
        vid.play().catch(() => { syncPlayIcon(); showTapToPlay(); });
        const tracks = shakaPlayerInstance.getVariantTracks().filter(t => t.height).sort((a,b) => a.height - b.height);
        const seen = new Set(); const levels = [];
        for (const t of tracks) { if (seen.has(t.height)) continue; seen.add(t.height); levels.push({ idx: t.id, height: t.height, bitrate: t.videoBandwidth || t.bandwidth }); }
        // ABR is on by default; user can pin a specific quality from settings.
        onLevels(levels,
          () => { const cfg = shakaPlayerInstance.getConfiguration(); return cfg.abr.enabled ? -1 : (shakaPlayerInstance.getVariantTracks().find(t=>t.active)?.id ?? -1); },
          (id) => {
            if (id === -1) { shakaPlayerInstance.configure({abr:{enabled:true}}); }
            else {
              shakaPlayerInstance.configure({abr:{enabled:false}});
              const tr = shakaPlayerInstance.getVariantTracks().find(t => t.id === id);
              if (tr) shakaPlayerInstance.selectVariantTrack(tr, true);
            }
          });
      }).catch(e => {
        console.error('Shaka load error:', e);
        onServerFail('Gagal memuat stream', 'SHAKA_' + (e.code || e.message || 'unknown'));
      });
    }
  }

  const startIdx = Math.max(0, Math.min(servers.length - 1, preferIdx | 0));
  tryServer(startIdx, false);
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
  }[c]));
}

// Translate cryptic engine error codes into something a normal user can act on.
function friendlyError(code) {
  if (!code) return null;
  const c = String(code).toUpperCase();
  if (c === 'MEDIA_1') return 'Pemutaran dibatalkan.';
  if (c === 'MEDIA_2') return 'Koneksi jaringan terputus saat memuat video.';
  if (c === 'MEDIA_3') return 'File video rusak atau codec tidak didukung browser ini.';
  if (c === 'MEDIA_4') return 'Format video tidak didukung di browser ini. Coba browser lain (Chrome / Edge) atau server lain.';
  if (c.startsWith('HLS_NETWORK')) return 'Server stream tidak merespons. Coba server lain di bawah nama channel.';
  if (c.startsWith('HLS_MANIFEST')) return 'Stream sudah berhenti atau dipindah.';
  if (c.startsWith('HLS_MEDIA'))    return 'Stream rusak — coba server lain.';
  if (c === 'HLS_UNSUPPORTED' || c === 'HLS_LOAD') return 'Player HLS gagal dimuat. Cek koneksi atau refresh halaman.';
  if (c.startsWith('SHAKA_UNSUPPORTED')) return 'Browser kamu tidak mendukung stream ini.';
  if (c.startsWith('SHAKA_LOAD'))   return 'Player gagal dimuat. Refresh halaman atau coba browser lain.';
  if (c.startsWith('SHAKA'))        return 'Stream error — coba server lain di bawah nama channel.';
  if (c.startsWith('FLV_UNSUPPORTED')) return 'Browser kamu tidak mendukung tipe stream FLV.';
  if (c.startsWith('FLV'))          return 'Server stream tidak merespons — coba server lain.';
  if (c === 'NO_URL')               return 'Server ini kosong — coba server lain.';
  return null;
}

function showToast(msg) {
  const t = document.createElement("div");
  t.className = "toast";
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 4000);
}

// Debounced search: re-render only after the user pauses typing for 160ms.
// On long lists (1000+ channels) the old per-keystroke filter made the UI
// stutter on mid-range phones.
let _searchTimer = null;
document.getElementById("search").oninput = () => {
  if (_searchTimer) clearTimeout(_searchTimer);
  _searchTimer = setTimeout(applyFilters, 160);
};

function applyFilters() {
  const q = document.getElementById("search").value.toLowerCase().trim();
  let source;
  if (chView === 'fav') {
    source = [];
    favs.forEach(k => {
      // Look across every cached country for the favorite. Fallback to
      // looking inside `recents` so a fav that was added from a country
      // we haven't re-visited this session still shows.
      let found = null;
      channelCache.forEach(arr => { if (!found) found = arr.find(c => chKey(c) === k); });
      if (!found) {
        const r = recents.find(r => r.key === k);
        if (r) found = r.snap;
      }
      if (found) source.push(found);
    });
  } else if (chView === 'recent') {
    source = recents.map(r => r.snap);
  } else if (chView === 'popular') {
    // Hydrate popular entries with full channel data when available so star /
    // play work properly; fall back to the snapshot the server provided.
    source = popularList.map(p => {
      let found = null;
      channelCache.forEach(arr => { if (!found) found = arr.find(c => chKey(c) === p.id); });
      return found || p;
    });
  } else if (chView === 'global') {
    source = [];
    channelCache.forEach(arr => arr.forEach(c => source.push(c)));
  } else {
    source = allChannels;
  }
  let list = source;
  if (hideBlocked) {
    list = list.filter(c => c.resolvable !== false && !failedChannels[chKey(c)]);
  }
  if (q) list = list.filter(c => (c.name || '').toLowerCase().includes(q));
  // Dedupe by chKey for global / fav views
  if (chView === 'global' || chView === 'fav' || chView === 'popular') {
    const seen = new Set();
    list = list.filter(c => { const k = chKey(c); if (seen.has(k)) return false; seen.add(k); return true; });
  }
  curList = list;
  if (curChannel) {
    const k = chKey(curChannel);
    curIndex = list.findIndex(c => chKey(c) === k);
  } else {
    curIndex = -1;
  }
  document.getElementById('channels').scrollTop = 0;
  renderChannels(list);
  updatePrevNext();
  const info = document.getElementById("info");
  const label = chView === 'fav' ? 'favorit'
              : chView === 'recent' ? 'baru ditonton'
              : chView === 'popular' ? 'paling sering ditonton'
              : chView === 'global' ? 'semua negara'
              : escapeHtml(currentCountryName || '');
  info.innerHTML = `<span class="dot"></span>${list.length} channel · ${label}`;
}

// ===== Channel-list tab system =====
function syncTabActive() {
  document.querySelectorAll('.ch-tab').forEach(t => {
    t.classList.toggle('active', t.dataset.view === chView);
  });
}
function updateTabCounts() {
  document.getElementById('cntAll').textContent = (allChannels || []).length;
  document.getElementById('cntFav').textContent = favs.size;
  document.getElementById('cntRecent').textContent = recents.length;
}
document.querySelectorAll('.ch-tab').forEach(tab => {
  tab.onclick = () => {
    chView = tab.dataset.view;
    if (globalMode) {
      globalMode = false;
      document.getElementById('globalBtn').classList.remove('on');
    }
    syncTabActive();
    applyFilters();
  };
});
document.getElementById('blockedBtn').onclick = () => {
  hideBlocked = !hideBlocked;
  store.set('hideBlocked', hideBlocked);
  document.getElementById('blockedBtn').classList.toggle('on', !hideBlocked);
  applyFilters();
};
document.getElementById('blockedBtn').classList.toggle('on', !hideBlocked);

document.getElementById('globalBtn').onclick = () => {
  globalMode = !globalMode;
  document.getElementById('globalBtn').classList.toggle('on', globalMode);
  if (globalMode) {
    chView = 'global';
    // Global search now operates ONLY on the categories the user has already
    // visited (already in channelCache). Eagerly prefetching every country
    // up-front fanned out ~150 /api/channels/* requests at once and trampled
    // the per-IP rate limit, surfacing as a flood of 429s. The user gets
    // instant feedback on visited categories; the rest fills as they browse.
  } else {
    chView = 'all';
  }
  syncTabActive();
  applyFilters();
};

// (prefetchAllCountries removed — see comment above)

// ===== Mobile nav (sidebar / bottom-sheet) =====
function openMobileNav() {
  document.getElementById("sidebar").classList.add("open");
  document.getElementById("mnavBackdrop").classList.add("open");
}
function closeMobileNav() {
  document.getElementById("sidebar").classList.remove("open");
  document.getElementById("mnavBackdrop").classList.remove("open");
}
document.getElementById("mnavBtn").onclick = () => {
  const open = document.getElementById("sidebar").classList.contains("open");
  open ? closeMobileNav() : openMobileNav();
};
document.getElementById("mnavBackdrop").onclick = closeMobileNav;

// Swipe-down-to-dismiss on the sheet handle (mobile).
(function attachSheetSwipe(){
  const sheet = document.getElementById('sidebar');
  let startY = null, dy = 0;
  sheet.addEventListener('touchstart', (e) => {
    if (!sheet.classList.contains('open')) return;
    if (e.touches[0].clientY < sheet.getBoundingClientRect().top + 40) {
      startY = e.touches[0].clientY; dy = 0;
    } else startY = null;
  }, {passive:true});
  sheet.addEventListener('touchmove', (e) => {
    if (startY == null) return;
    dy = Math.max(0, e.touches[0].clientY - startY);
    sheet.style.transform = `translateY(${dy}px)`;
  }, {passive:true});
  sheet.addEventListener('touchend', () => {
    if (startY == null) return;
    sheet.style.transform = '';
    if (dy > 100) closeMobileNav();
    startY = null; dy = 0;
  });
})();

// ===== Prev / next channel =====
function updatePrevNext() {
  const prev = document.getElementById('vPrev');
  const next = document.getElementById('vNext');
  if (!prev || !next) return;
  prev.classList.toggle('disabled', curIndex <= 0);
  next.classList.toggle('disabled', curIndex < 0 || curIndex >= curList.length - 1);
}
function playRel(delta) {
  if (!curList.length || curIndex < 0) return;
  const i = curIndex + delta;
  if (i < 0 || i >= curList.length) return;
  const ch = curList[i];
  // Find DOM row if rendered; otherwise just trigger playback.
  const rows = document.querySelectorAll('#channels .channel-item');
  let row = null;
  if (rows[i]) row = rows[i];
  playChannel(ch, row || document.createElement('div'));
}

// ===== Global keyboard shortcuts =====
document.addEventListener('keydown', (e) => {
  const tag = (e.target && e.target.tagName) || '';
  const inField = /^(INPUT|TEXTAREA|SELECT)$/.test(tag) || (e.target && e.target.isContentEditable);
  // "/" focuses search even when typing somewhere else
  if (e.key === '/' && !inField) {
    e.preventDefault();
    document.getElementById('search').focus();
    return;
  }
  if (inField) return;
  const vid = document.getElementById('vid');
  switch (e.key) {
    case ' ': case 'k':
      if (vid) { e.preventDefault(); vid.paused ? vid.play().catch(()=>{}) : vid.pause(); }
      break;
    case 'm':
      if (vid) { vid.muted = !vid.muted; }
      break;
    case 'f':
      if (vid) {
        const shell = document.getElementById('pshell');
        if (document.fullscreenElement) document.exitFullscreen();
        else if (shell && shell.requestFullscreen) shell.requestFullscreen();
      }
      break;
    case 'p':
      if (vid && document.pictureInPictureEnabled && !vid.disablePictureInPicture) {
        if (document.pictureInPictureElement) document.exitPictureInPicture();
        else vid.requestPictureInPicture().catch(()=>{});
      }
      break;
    case 'ArrowUp':
      if (vid) { vid.volume = Math.min(1, vid.volume + 0.05); vid.muted = false; e.preventDefault(); }
      break;
    case 'ArrowDown':
      if (vid) { vid.volume = Math.max(0, vid.volume - 0.05); e.preventDefault(); }
      break;
    case 'ArrowLeft':
      playRel(-1); e.preventDefault(); break;
    case 'ArrowRight':
      playRel(+1); e.preventDefault(); break;
    case 'Escape':
      if (document.getElementById('sidebar').classList.contains('open')) closeMobileNav();
      break;
  }
});

// ===== Service worker (PWA) =====
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/sw.js').catch(()=>{});
  });
}

// ===== Persist volume across sessions =====
function bindVolumePersistence() {
  const vid = document.getElementById('vid');
  if (!vid) return;
  const v = store.get('volume', null);
  const m = store.get('muted', false);
  if (v != null) vid.volume = v;
  vid.muted = m;
  vid.addEventListener('volumechange', () => {
    store.set('volume', vid.volume);
    store.set('muted', vid.muted);
  });
}

loadCountries();
updateTabCounts();
refreshPopular();
refreshOnline();
// Re-pull popular every 60s while the tab is visible. Pause when hidden so
// we don't burn battery / bandwidth on background tabs.
let _popTimer = null;
// Online counter: poll every 30s. Separate from popular for faster updates.
let _onlineTimer = null;
let _onlineHeartbeatTimer = null;
let _onlineTotal = 0;
async function refreshOnline() {
  try {
    const r = await fetch('https://seeking-trademark-plate-modifications.trycloudflare.com/api/online');
    const data = await r.json();
    _onlineTotal = data.total || 0;
    const badge = document.getElementById('onlineBadge');
    const num = document.getElementById('onlineCount');
    if (_onlineTotal > 0) {
      badge.style.display = 'flex';
      num.textContent = _onlineTotal;
    } else {
      badge.style.display = 'none';
    }
  } catch(e) {}
}
function startOnlineTimers() {
  if (!_onlineTimer) _onlineTimer = setInterval(refreshOnline, 30000);
  if (!_onlineHeartbeatTimer) _onlineHeartbeatTimer = setInterval(sendHeartbeat, 30000);
}
function stopOnlineTimers() {
  if (_onlineTimer) { clearInterval(_onlineTimer); _onlineTimer = null; }
  if (_onlineHeartbeatTimer) { clearInterval(_onlineHeartbeatTimer); _onlineHeartbeatTimer = null; }
}
function sendHeartbeat() {
  // Re-send the last ping so the server knows this viewer is still watching.
  if (!curChannel) return;
  try {
    navigator.sendBeacon?.('/api/ping', new Blob([JSON.stringify({
      key:     chKey(curChannel),
      name:    curChannel.name || '',
      logo:    curChannel.logo || '',
      cc:      curChannel._cc || curChannel.country_tag || currentCountry || '',
      country: curChannel._ccName || currentCountryName || '',
      tagline: curChannel.tagline || '',
    })], {type: 'application/json'}));
  } catch(e) {}
}
function startPopTimer() {
  if (_popTimer) return;
  _popTimer = setInterval(refreshPopular, 60000);
}
function stopPopTimer() {
  if (_popTimer) { clearInterval(_popTimer); _popTimer = null; }
}
document.addEventListener('visibilitychange', () => {
  if (document.hidden) { stopPopTimer(); stopOnlineTimers(); }
  else { refreshPopular(); refreshOnline(); startPopTimer(); startOnlineTimers(); }
});
if (!document.hidden) { startPopTimer(); startOnlineTimers(); }
