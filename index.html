<html lang="en">
<head>

       STREAMTV — Live Streaming Player
       Dark theme + neon green accent
       ============================================ */
    
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: #0a0a0a;
      color: #e0e0e0;
      min-height: 100vh;
      overflow-x: hidden;
    }
    
    /* Header */
    .header {
      background: #111;
      border-bottom: 1px solid #1a1a1a;
      padding: 12px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    
    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    
    .logo-icon {
      width: 36px;
      height: 36px;
      background: #00e676;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }
    
    .logo-text h1 {
      font-size: 16px;
      color: #fff;
      font-weight: 700;
    }
    
    .logo-text span {
      font-size: 10px;
      color: #666;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    
    .header-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    
    .status-badge {
      display: flex;
      align-items: center;
      gap: 6px;
      background: #1a1a1a;
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 12px;
    }
    
    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #00e676;
      animation: pulse 2s infinite;
    }
    
    .status-dot.red { background: #ff5252; }
    
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    
    /* Category Bar */
    .category-bar {
      background: #111;
      padding: 10px 20px;
      display: flex;
      align-items: center;
      gap: 8px;
      overflow-x: auto;
      scrollbar-width: none;
      border-bottom: 1px solid #1a1a1a;
    }
    
    .category-bar::-webkit-scrollbar { display: none; }
    
    .category-label {
      font-size: 11px;
      color: #666;
      text-transform: uppercase;
      letter-spacing: 1px;
      white-space: nowrap;
      margin-right: 8px;
    }
    
    .category-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      color: #aaa;
      padding: 8px 14px;
      border-radius: 20px;
      cursor: pointer;
      font-size: 13px;
      white-space: nowrap;
      transition: all 0.2s;
    }
    
    .category-btn:hover {
      background: #222;
      border-color: #00e676;
      color: #fff;
    }
    
    .category-btn.active {
      background: #00e676;
      color: #000;
      border-color: #00e676;
      font-weight: 600;
    }
    
    .category-count {
      background: rgba(255,255,255,0.1);
      padding: 2px 6px;
      border-radius: 10px;
      font-size: 11px;
    }
    
    .category-btn.active .category-count {
      background: rgba(0,0,0,0.2);
    }
    
    /* Main Layout */
    .main {
      display: flex;
      height: calc(100vh - 110px);
    }
    
    /* Player Area */
    .player-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: #0d0d0d;
    }
    
    .player-container {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #000;
      position: relative;
    }
    
    .player-placeholder {
      text-align: center;
      color: #333;
    }
    
    .player-placeholder .icon {
      font-size: 64px;
      margin-bottom: 16px;
    }
    
    .player-placeholder h2 {
      font-size: 18px;
      color: #555;
      margin-bottom: 8px;
    }
    
    .player-placeholder p {
      font-size: 13px;
      color: #333;
    }
    
    /* Video Player */
    #videoPlayer {
      width: 100%;
      height: 100%;
      background: #000;
    }
    
    /* Player Info Bar */
    .player-info {
      background: #111;
      padding: 10px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-top: 1px solid #1a1a1a;
    }
    
    .now-playing {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
    }
    
    .now-playing .live-badge {
      background: #ff5252;
      color: #fff;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
    }
    
    .player-controls {
      display: flex;
      gap: 8px;
    }
    
    .control-btn {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      color: #aaa;
      padding: 6px 12px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
      transition: all 0.2s;
    }
    
    .control-btn:hover {
      background: #222;
      color: #fff;
    }
    
    /* Sidebar */
    .sidebar {
      width: 320px;
      background: #111;
      border-left: 1px solid #1a1a1a;
      display: flex;
      flex-direction: column;
    }
    
    .sidebar-header {
      padding: 12px;
      border-bottom: 1px solid #1a1a1a;
    }
    
    .search-box {
      display: flex;
      align-items: center;
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 8px;
      padding: 8px 12px;
      gap: 8px;
    }
    
    .search-box input {
      flex: 1;
      background: none;
      border: none;
      color: #fff;
      font-size: 13px;
      outline: none;
    }
    
    .search-box input::placeholder { color: #555; }
    
    .search-icon { color: #555; font-size: 14px; }
    
    /* Filter Tabs */
    .filter-tabs {
      display: flex;
      gap: 4px;
      padding: 8px 12px;
      border-bottom: 1px solid #1a1a1a;
    }
    
    .filter-tab {
      display: flex;
      align-items: center;
      gap: 4px;
      background: none;
      border: none;
      color: #666;
      padding: 6px 10px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
      transition: all 0.2s;
    }
    
    .filter-tab:hover { background: #1a1a1a; color: #aaa; }
    
    .filter-tab.active {
      background: #00e676;
      color: #000;
      font-weight: 600;
    }
    
    /* Channel List */
    .channel-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
    }
    
    .channel-list::-webkit-scrollbar { width: 4px; }
    .channel-list::-webkit-scrollbar-track { background: transparent; }
    .channel-list::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }
    
    .channel-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s;
      margin-bottom: 4px;
    }
    
    .channel-item:hover { background: #1a1a1a; }
    
    .channel-item.active {
      background: rgba(0, 230, 118, 0.1);
      border: 1px solid rgba(0, 230, 118, 0.3);
    }
    
    .channel-thumb {
      width: 48px;
      height: 32px;
      background: #222;
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
    }
    
    .channel-info {
      flex: 1;
      min-width: 0;
    }
    
    .channel-name {
      font-size: 13px;
      color: #ddd;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    
    .channel-meta {
      font-size: 11px;
      color: #555;
      margin-top: 2px;
    }
    
    .channel-live {
      font-size: 10px;
      color: #ff5252;
      font-weight: 600;
    }

      background: #111;
      border-top: 1px solid #1a1a1a;
      padding: 12px;
      max-height: 200px;
      overflow-y: auto;
    }
    
    .comments-title {
      font-size: 13px;
      color: #666;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    
    .comment {
      display: flex;
      gap: 8px;
      margin-bottom: 8px;
    }
    
    .comment-avatar {
      width: 24px;
      height: 24px;
      background: #2a2a2a;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      flex-shrink: 0;
    }
    
    .comment-body {
      flex: 1;
    }
    
    .comment-user {
      font-size: 12px;
      color: #00e676;
      font-weight: 600;
    }
    
    .comment-text {
      font-size: 12px;
      color: #aaa;
      margin-top: 2px;
    }
    
    .comment-time {
      font-size: 10px;
      color: #444;
      margin-top: 2px;
    }
    
    /* Responsive */
    @media (max-width: 768px) {
      .main { flex-direction: column; height: auto; }
      .sidebar { width: 100%; height: 50vh; }
      .player-container { min-height: 50vh; }
      .category-bar { padding: 8px 12px; }
    }
  </style>
